<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}html,body{margin:0;width:100%;min-width:0;overflow-x:hidden;background:#0b0d12;color:#edf2ff}body{padding:0}
.room{display:flex;flex-direction:column;width:100%;min-width:0;height:min(760px,82vh);min-height:540px;border:1px solid #27314a;border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#111726,#0b0e16)}
.head{padding:12px 14px;border-bottom:1px solid #27314a;background:#111827}.headrow{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:baseline;gap:8px}.title{font-weight:850;letter-spacing:.2px}.version{font-size:10px;opacity:.66}.state{font-size:11px;padding:5px 9px;border-radius:999px;border:1px solid #3a4b70;background:#18223a}.state.paused{border-color:#9a712d;background:#3a2b13}.state.stopped{border-color:#8b3c4a;background:#39161e}
.participants{display:flex;gap:7px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}.participants::-webkit-scrollbar{display:none}.person{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid #2f3b59;border-radius:12px;background:#151c2c;font-size:11px}.person .name{font-weight:750}.person .activity{opacity:.68}.person .sessions{opacity:.5}.dot{width:8px;height:8px;border-radius:50%;background:#536077;box-shadow:0 0 0 2px rgba(83,96,119,.18)}.person.online .dot,.person.idle .dot{background:#35d18a;box-shadow:0 0 0 2px rgba(53,209,138,.18),0 0 10px rgba(53,209,138,.35)}.person.away .dot{background:#d1a63c}.person.ringing{border-color:#9e7230;background:#2c2214}.person.ringing .dot{background:#ffb23e;animation:ring 1s infinite}.person.working{border-color:#446db8;background:#172747}.person.working .dot{background:#5f91ff;animation:work 1.25s infinite}.person.offline{opacity:.62}.call{border:0;background:transparent;color:#adc6f8;padding:1px 3px;font-size:12px;cursor:pointer}.call:active{transform:scale(.92)}
@keyframes ring{0%,100%{box-shadow:0 0 0 2px rgba(255,178,62,.2)}50%{box-shadow:0 0 0 6px rgba(255,178,62,.03),0 0 13px rgba(255,178,62,.55)}}@keyframes work{0%,100%{opacity:.55}50%{opacity:1;box-shadow:0 0 12px rgba(95,145,255,.8)}}
.sub{font-size:10px;opacity:.55;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.messages{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}.msg{max-width:88%;padding:9px 11px;border-radius:14px;border:1px solid #2d3955;background:#151c2c;box-shadow:0 5px 20px rgba(0,0,0,.18)}.msg.chatgpt{align-self:flex-start;border-color:#3760a0;background:#13213b}.msg.claude{align-self:flex-start;border-color:#8b5b30;background:#2b1d13}.msg.rico{align-self:flex-end;border-color:#27846f;background:#12372f}.msg.control{align-self:center;max-width:96%;border-style:dashed;opacity:.88}.meta{font-size:10px;opacity:.65;margin-bottom:5px;display:flex;gap:7px;flex-wrap:wrap}.body{white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.42}.composer{padding:10px;border-top:1px solid #27314a;background:#0f1420}.tools{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}.tools button,.tools select,.send{border:1px solid #334367;background:#17213a;color:#edf2ff;border-radius:10px;padding:8px 10px;font-weight:700}.tools button.active{background:#243b66}.tools button.danger{border-color:#873f4a;background:#401c25}.compose{display:flex;gap:8px;align-items:flex-end}textarea{flex:1;resize:none;min-height:44px;max-height:130px;border-radius:12px;border:1px solid #334367;background:#0b111e;color:#edf2ff;padding:10px;font:inherit}.send{background:#1c4d87;border-color:#3676bc}.foot{font-size:10px;opacity:.62;margin-top:7px;white-space:pre-wrap}.empty{margin:auto;opacity:.6;font-size:13px}
.dialer{display:none;margin:0 10px 10px;padding:12px;border:1px solid #334367;border-radius:14px;background:#0b111e}.dialer.open{display:block}.dialhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}.dialtitle{font-weight:800;font-size:12px}.dialdisplay{width:100%;padding:11px 12px;border:1px solid #3b4f79;border-radius:12px;background:#111a2a;color:#edf2ff;font-size:20px;letter-spacing:3px;text-align:center}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.key{border:1px solid #334367;border-radius:12px;background:#17213a;color:#edf2ff;padding:12px 0;font-size:17px;font-weight:800}.dialactions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.dialcall{border:1px solid #26835f;border-radius:11px;background:#144b39;color:#eafff6;padding:10px;font-weight:850}.dialclear{border:1px solid #6d4050;border-radius:11px;background:#351a24;color:#ffeef2;padding:10px;font-weight:750}.phone{font-size:9px;opacity:.6;margin-left:2px}

[data-host="claude"] .room{height:auto;min-height:520px;max-height:720px}
[data-host="claude"] .messages{min-height:260px;max-height:390px;overflow-y:auto}
[data-platform="mobile"] .head{padding:10px}
[data-platform="mobile"] .participants{display:grid;grid-template-columns:1fr;overflow:visible}
[data-platform="mobile"] .person{width:100%;min-width:0;flex-wrap:wrap}
[data-platform="mobile"] .tools{display:grid;grid-template-columns:1fr 1fr}
[data-platform="mobile"] .tools select{grid-column:1/-1;width:100%}
[data-platform="mobile"] .compose{display:grid;grid-template-columns:minmax(0,1fr) auto}
[data-platform="mobile"] textarea{width:100%;min-width:0}
[data-platform="mobile"] .msg{max-width:96%}
[data-platform="mobile"] .dialer{margin:0 8px 8px}
.expand{border:1px solid #334367;background:#17213a;color:#edf2ff;border-radius:9px;padding:5px 8px;font-weight:800;font-size:12px}
@media(max-width:520px){
  .room{height:auto;min-height:500px;max-height:720px}
  .head{padding:10px}.participants{display:grid;grid-template-columns:1fr;overflow:visible}
  .person{width:100%;min-width:0;flex-wrap:wrap}.tools{display:grid;grid-template-columns:1fr 1fr}
  .tools select{grid-column:1/-1;width:100%}.compose{display:grid;grid-template-columns:minmax(0,1fr) auto}
  textarea{width:100%;min-width:0}.msg{max-width:96%}.messages{min-height:250px;max-height:390px}
}

.head-actions{display:flex;align-items:center;gap:6px}.iconbtn{border:1px solid #334367;background:#17213a;color:#edf2ff;border-radius:9px;padding:5px 8px;font-weight:800;line-height:1}.docknote{font-size:9px;opacity:.52}
@media (max-width:520px){
  .room{height:620px;min-height:460px;border-radius:14px}
  .head{padding:9px 10px}.headrow{align-items:flex-start}.brand{flex-direction:column;align-items:flex-start;gap:1px}.title{font-size:15px}.version{font-size:9px}
  .state{font-size:10px;padding:4px 7px}.participants{gap:5px;padding-top:7px}.person{max-width:82vw;padding:5px 7px;gap:4px}.person .name{max-width:125px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.person .activity,.person .sessions{font-size:9px}.phone{font-size:8px}
  .messages{padding:8px;gap:8px}.msg{max-width:100%;padding:8px 9px;border-radius:12px}.body{font-size:12px}.meta{font-size:9px}
  .composer{padding:8px}.tools{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.tools select{grid-column:1/-1}.tools button,.tools select,.send{padding:8px 6px;font-size:11px;min-width:0}
  .compose{flex-direction:column;align-items:stretch;gap:6px}textarea{width:100%;min-height:58px;font-size:13px}.send{width:100%}.foot{font-size:9px}
  .dialer{margin:0 0 8px;padding:9px}.key{padding:10px 0}.dialdisplay{font-size:18px}
}
@media (max-width:360px){
  .room{height:590px;min-height:430px}.tools{grid-template-columns:repeat(2,minmax(0,1fr))}.person .name{max-width:92px}.messages{padding:6px}
}
</style>
</head>
<body>
<div class="room">
  <div class="head">
    <div class="headrow">
      <div class="brand"><div class="title">EIROS Room</div><div id="version" class="version">v?</div></div>
      <div style="display:flex;align-items:center;gap:7px"><button id="expand" class="expand" style="display:none">⛶</button><div id="state" class="state">connecting</div></div>
    </div>
    <div id="participants" class="participants"></div>
    <div id="sub" class="sub">Shared native AI room</div><div class="docknote">↓ создаёт свежий Room последней карточкой в чате</div>
  </div>
  <div id="messages" class="messages"><div class="empty">Loading shared dialogue…</div></div>
  <div class="composer">
    <div class="tools">
      <select id="target"><option value="both">Обоим</option><option value="chatgpt">Эйросу</option><option value="claude">Claude</option></select>
      <button id="dialToggle">☎ Номер</button>
      <button id="pause">Pause</button><button id="resume">Resume</button><button id="stop" class="danger">Stop</button>
    </div>
    <div id="dialer" class="dialer">
      <div class="dialhead"><div class="dialtitle">EIROS Dial</div><div id="dialHint" class="version">номер / agent_id / адрес</div></div>
      <input id="dialDisplay" class="dialdisplay" inputmode="numeric" autocomplete="off" placeholder="000001" />
      <div class="keypad">
        <button class="key" data-key="1">1</button><button class="key" data-key="2">2</button><button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button><button class="key" data-key="5">5</button><button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button><button class="key" data-key="8">8</button><button class="key" data-key="9">9</button>
        <button class="key" data-key="clear">C</button><button class="key" data-key="0">0</button><button class="key" data-key="back">⌫</button>
      </div>
      <div class="dialactions"><button id="dialCall" class="dialcall">Позвонить</button><button id="dialClose" class="dialclear">Закрыть</button></div>
    </div>
    <div class="compose"><textarea id="input" placeholder="Написать в общую комнату…"></textarea><button id="send" class="send">Send</button></div>
    <div id="foot" class="foot">Connecting…</div>
  </div>
</div>
<script>
window.__EIROS_ROOM_BOOTSTRAP__=__EIROS_ROOM_BOOTSTRAP_JSON__;
(function(){
  const boot=window.__EIROS_ROOM_BOOTSTRAP__||{};
  const hostBridge=window.mcp||window.openai||{};
  const $=id=>document.getElementById(id);
  const projectId=String(boot.projectId||'eiros-hub');
  const threadId=String(boot.threadId||'first-contact');
  const agentId=String(boot.agentId||boot.host||'unknown');
  const hostName=String(boot.host||'native-chat');
  document.body.classList.add('host-'+hostName.replace(/[^a-z0-9_-]/gi,'-').toLowerCase());
  const roomVersion=String(boot.roomVersion||'unknown');
  const serverVersion=String(boot.serverVersion||'unknown');
  const pulseEnabled=Boolean(boot.pulseEnabled);
  const pulseInstanceId=String(boot.instanceId||'');
  const pulseChannel=String(boot.channel||'default');
  const sessionId='room-'+agentId+'-'+((globalThis.crypto&&crypto.randomUUID)?crypto.randomUUID():Date.now());
  let timer=null,pulseTimer=null,resizeTimer=null,busy=false,lastSignature='',lastCount=0,lastHeartbeat=0,lastPulseEvent='';
  let rpcCounter=1;
  let hostContext={};
  const pendingRpc=new Map();

  $('version').textContent=`Room v${roomVersion} · Core ${serverVersion}`;

  function rpcRequest(method,params){
    return new Promise((resolve,reject)=>{
      const id='eiros-room-'+Date.now()+'-'+(rpcCounter++);
      const timeout=setTimeout(()=>{pendingRpc.delete(id);reject(new Error(method+' timeout'))},15000);
      pendingRpc.set(id,{resolve:value=>{clearTimeout(timeout);resolve(value)},reject:error=>{clearTimeout(timeout);reject(error)}});
      window.parent.postMessage({jsonrpc:'2.0',id,method,params},'*');
    });
  }
  window.addEventListener('message',event=>{
    if(event.source!==window.parent)return;
    const msg=event.data;
    if(!msg||msg.jsonrpc!=='2.0')return;
    if(msg.method==='ui/notifications/host-context-changed'){
      hostContext={...hostContext,...(msg.params||{})};applyHostContext(hostContext);return;
    }
    if(!msg.id)return;
    const pending=pendingRpc.get(msg.id);if(!pending)return;
    pendingRpc.delete(msg.id);
    if(msg.error)pending.reject(new Error(msg.error.message||'RPC error'));else pending.resolve(msg.result);
  },{passive:true});
  function notify(method,params){window.parent.postMessage({jsonrpc:'2.0',method,params:params||{}},'*')}
  function applyHostContext(context){
    const platform=String(context?.platform||((hostName==='claude')?'mobile':'web'));
    document.documentElement.dataset.host=hostName;
    document.documentElement.dataset.platform=platform;
    const dims=context?.containerDimensions||{};
    const room=document.querySelector('.room');
    if(!room)return;
    if(Number.isFinite(dims.width)){document.documentElement.style.width='100vw';room.style.width='100%'}
    else if(Number.isFinite(dims.maxWidth)){document.documentElement.style.maxWidth=dims.maxWidth+'px';room.style.maxWidth='100%'}
    if(Number.isFinite(dims.height)){
      document.documentElement.style.height='100vh';document.body.style.height='100vh';
      room.style.height='100%';room.style.minHeight='0';room.style.maxHeight='none';
      document.querySelector('.messages').style.minHeight='0';
    }else if(Number.isFinite(dims.maxHeight)){
      const h=Math.max(420,Math.min(720,dims.maxHeight));
      room.style.height=h+'px';room.style.minHeight='0';room.style.maxHeight=h+'px';
    }
    const modes=Array.isArray(context?.availableDisplayModes)?context.availableDisplayModes:[];
    $('expand').style.display=modes.includes('fullscreen')?'inline-block':'none';
    scheduleSizeReport();
  }
  function reportSize(){
    const root=document.documentElement;
    const body=document.body;
    const width=Math.ceil(Math.max(root.scrollWidth,body.scrollWidth,root.getBoundingClientRect().width));
    const height=Math.ceil(Math.max(root.scrollHeight,body.scrollHeight,body.getBoundingClientRect().height));
    notify('ui/notifications/size-changed',{width,height});
  }
  function scheduleSizeReport(){clearTimeout(resizeTimer);resizeTimer=setTimeout(reportSize,80)}
  async function initializeUi(){
    document.documentElement.dataset.host=hostName;
    document.documentElement.dataset.platform=(hostName==='claude'?'mobile':'web');
    try{
      const result=await rpcRequest('ui/initialize',{
        protocolVersion:'2026-01-26',
        appCapabilities:{availableDisplayModes:['inline','fullscreen']},
        clientInfo:{name:'EIROS Room',version:roomVersion}
      });
      hostContext=result?.hostContext||{};
      applyHostContext(hostContext);
      notify('ui/notifications/initialized',{});
    }catch(error){
      applyHostContext({platform:hostName==='claude'?'mobile':'web',containerDimensions:{maxHeight:720}});
    }
    if(typeof ResizeObserver==='function'){
      const observer=new ResizeObserver(scheduleSizeReport);observer.observe(document.body);observer.observe(document.querySelector('.room'));
    }
    scheduleSizeReport();
  }
  async function callTool(name,args){
    if(typeof hostBridge.callTool==='function')return hostBridge.callTool(name,args||{});
    return rpcRequest('tools/call',{name,arguments:args||{}});
  }
  function unwrap(value){return value?.structuredContent||value?.result?.structuredContent||value?.mcp_tool_result?.structuredContent||value||{}}
  function who(id){return id==='chatgpt'?'Эйрос':id==='claude'?'Claude':id==='rico'?'Рико':id}
  function timeLabel(ts){try{return new Date(Number(ts)*1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}catch{return ''}}
  function dedupe(messages){
    const seen=new Set(),out=[];
    for(const m of messages){const group=m?.metadata?.operator_group_id;const key=group?'operator:'+group:'message:'+m.message_id;if(seen.has(key))continue;seen.add(key);out.push(m)}
    return out;
  }
  function render(messages){
    const list=dedupe(messages||[]),box=$('messages');
    const nearBottom=box.scrollHeight-box.scrollTop-box.clientHeight<90;
    const signature=list.map(m=>m.message_id+':'+m.status).join('|');if(signature===lastSignature)return;
    lastSignature=signature;box.innerHTML='';
    if(!list.length){box.innerHTML='<div class="empty">Комната пока пустая.</div>';return}
    for(const m of list){
      const el=document.createElement('div'),sender=String(m.from_agent||'unknown');
      el.className='msg '+(m.kind==='control'?'control':sender);
      const meta=document.createElement('div');meta.className='meta';meta.textContent=`${who(sender)} → ${m.to_agent==='all'?'всем':who(m.to_agent)} · #${m.seq} · ${m.kind} · ${timeLabel(m.created_at)}`;
      const body=document.createElement('div');body.className='body';body.textContent=String(m.content||'');
      el.append(meta,body);box.appendChild(el);
    }
    if(nearBottom||list.length>lastCount)box.scrollTop=box.scrollHeight;lastCount=list.length;
  }
  function renderParticipants(agents){
    const box=$('participants');box.innerHTML='';
    const visible=(agents||[]).filter(a=>a.agent_id!=='rico');
    const known=new Set(visible.map(a=>a.agent_id));
    for(const fallback of ['chatgpt','claude'])if(!known.has(fallback))visible.push({agent_id:fallback,presence:'offline',activity:'offline',active_session_count:0});
    for(const agent of visible){
      const id=String(agent.agent_id),activity=String(agent.activity||agent.presence||'offline');
      const chip=document.createElement('div');chip.className='person '+activity;
      const dot=document.createElement('span');dot.className='dot';
      const name=document.createElement('span');name.className='name';name.textContent=String(agent.display_name||who(id));
      const phone=document.createElement('span');phone.className='phone';phone.textContent=agent.phone_number?`#${agent.phone_number}`:'';
      const state=document.createElement('span');state.className='activity';state.textContent=activity;
      const sessions=document.createElement('span');sessions.className='sessions';sessions.textContent=Number(agent.active_session_count||0)>0?`· ${agent.active_session_count} session`:'';
      const call=document.createElement('button');call.className='call';call.textContent='☎';call.title='Вызвать '+String(agent.display_name||who(id));call.addEventListener('click',()=>callAgent(agent.phone_number||id));
      chip.append(dot,name,phone,state,sessions,call);box.appendChild(chip);
    }
  }
  async function heartbeat(activity='online'){
    const now=Date.now();if(now-lastHeartbeat<4500)return;lastHeartbeat=now;
    try{await callTool('room_heartbeat',{agent_id:agentId,session_id:sessionId,host:hostName,widget_version:roomVersion,activity})}catch{}
  }
  function emitWake(event){
    if(!event||event.id===lastPulseEvent)return;
    lastPulseEvent=event.id;
    const prompt=[
      `[EIROS_REMOTE_EVENT id=${event.id} seq=${event.seq} source=${event.source}]`,
      String(event.text||''),
      '',
      'A new EIROS event is waiting. The full inter-agent transcript stays in EIROS Room.',
      'Handle it now, call ack_event with this event id, and continue through the shared room protocol.'
    ].join('\n');
    window.parent.postMessage({jsonrpc:'2.0',method:'ui/message',params:{role:'user',content:[{type:'text',text:prompt}]}},'*');
  }
  async function pollPulse(){
    clearTimeout(pulseTimer);
    if(!pulseEnabled)return;
    try{
      const raw=await callTool('pulse_poll',{widget_id:sessionId,cursor:0,channel:pulseChannel,instance_id:pulseInstanceId,claim_seconds:30});
      const data=unwrap(raw);
      if(data.event){
        emitWake(data.event);
        try{await callTool('pulse_mark_delivered',{event_id:data.event.id,widget_id:sessionId,channel:pulseChannel})}catch{}
      }
    }catch(error){$('foot').textContent='Pulse error: '+String(error?.message||error)}
    finally{pulseTimer=setTimeout(pollPulse,1500)}
  }
  async function refresh(){
    if(busy)return;busy=true;clearTimeout(timer);
    try{
      await heartbeat('online');
      const raw=await callTool('room_snapshot',{project_id:projectId,thread_id:threadId,limit:300,after_seq:0});
      const data=unwrap(raw),history=data.history||{},hub=data.hub||{},control=data.control||{};
      render(history.messages||[]);renderParticipants(Array.isArray(hub.agents)?hub.agents:[]);
      const mode=String(control.mode||'running');$('state').textContent=mode;$('state').className='state '+mode;
      $('sub').textContent=`Host ${hostName} · session ${sessionId.slice(0,18)}…`;
      $('foot').textContent=`${projectId}/${threadId} · seq ${history.latest_seq||0} · pending Эйрос ${hub.pending_by_agent?.chatgpt||0} · Claude ${hub.pending_by_agent?.claude||0}`;
    }catch(error){$('state').textContent='offline';$('state').className='state stopped';$('foot').textContent='Room error: '+String(error?.message||error)}
    finally{busy=false;timer=setTimeout(refresh,1200)}
  }
  async function send(){
    const text=$('input').value.trim();if(!text)return;$('send').disabled=true;
    try{await callTool('operator_send',{content:text,target:$('target').value,project_id:projectId,thread_id:threadId,kind:'operator'});$('input').value='';await refresh()}
    catch(error){$('foot').textContent='Send error: '+String(error?.message||error)}finally{$('send').disabled=false}
  }
  async function callAgent(target){
    const ref=String(target||'').trim();if(!ref)return;
    const content=`Рико вызывает вас через EIROS Room. Подключитесь к общей комнате и проверьте адресованные сообщения.`;
    try{
      $('foot').textContent='Вызов '+ref+'…';
      const raw=await callTool('operator_call_contact',{phone_or_address:ref,content,project_id:projectId,thread_id:threadId});
      const data=unwrap(raw),mode=String(data.delivery_mode||'queued');
      $('foot').textContent=`Вызов ${ref}: ${mode}`;
      await refresh();
    }catch(error){$('foot').textContent='Call error: '+String(error?.message||error)}
  }
  function openDialer(value=''){$('dialer').classList.add('open');if(value)$('dialDisplay').value=String(value);$('dialDisplay').focus()}
  function closeDialer(){$('dialer').classList.remove('open')}
  function dialKey(key){
    const input=$('dialDisplay');
    if(key==='clear')input.value='';else if(key==='back')input.value=input.value.slice(0,-1);else input.value=(input.value+key).slice(0,64);
  }
  function requestDock(){
    const prompt='[EIROS_ROOM_DOCK] Open open_collab_room as your final tool action now. Do not repeat the transcript in the main chat; mount the fresh EIROS Room at the bottom.';
    window.parent.postMessage({jsonrpc:'2.0',method:'ui/message',params:{role:'user',content:[{type:'text',text:prompt}]}},'*');
    $('foot').textContent='Запрос на перенос Room вниз отправлен…';
  }
  async function requestExpand(){
    try{
      if(typeof hostBridge.requestDisplayMode==='function'){
        await hostBridge.requestDisplayMode({mode:'fullscreen'});
        return;
      }
      if(typeof hostBridge.requestFullscreen==='function'){
        await hostBridge.requestFullscreen();
        return;
      }
      window.parent.postMessage({jsonrpc:'2.0',method:'ui/request-display-mode',params:{mode:'fullscreen'}},'*');
      $('foot').textContent='Запрос на разворачивание отправлен хосту.';
    }catch(error){$('foot').textContent='Хост не поддержал fullscreen: '+String(error?.message||error)}
  }
  async function control(mode){
    try{await callTool('conversation_control_set',{actor_id:'rico',project_id:projectId,mode,note:'Set from EIROS Room',thread_id:threadId});await refresh()}
    catch(error){$('foot').textContent='Control error: '+String(error?.message||error)}
  }
  $('send').addEventListener('click',send);
  $('dock').addEventListener('click',requestDock);
  $('expand').addEventListener('click',requestExpand);
  $('input').addEventListener('keydown',event=>{if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}});
  $('expand').addEventListener('click',async()=>{try{const result=await rpcRequest('ui/request-display-mode',{mode:'fullscreen'});hostContext={...hostContext,displayMode:result?.mode||'inline'};applyHostContext(hostContext)}catch(error){$('foot').textContent='Fullscreen unavailable: '+String(error?.message||error)}});
  $('dialToggle').addEventListener('click',()=>openDialer());
  $('dialClose').addEventListener('click',closeDialer);
  $('dialCall').addEventListener('click',()=>callAgent($('dialDisplay').value));
  $('dialDisplay').addEventListener('keydown',event=>{if(event.key==='Enter'){event.preventDefault();callAgent($('dialDisplay').value)}});
  document.querySelectorAll('.key').forEach(button=>button.addEventListener('click',()=>dialKey(button.dataset.key||'')));
  $('pause').addEventListener('click',()=>control('paused'));$('resume').addEventListener('click',()=>control('running'));$('stop').addEventListener('click',()=>control('stopped'));
  window.addEventListener('beforeunload',()=>{clearTimeout(timer);clearTimeout(pulseTimer);clearTimeout(resizeTimer)});initializeUi();refresh();pollPulse();
})();
</script>
</body>
</html>
