<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<style>
:root{
  color-scheme:dark;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
  --bg:#07090e;--panel:#0d1119;--panel2:#111826;--line:#222c3d;--text:#eef4ff;--muted:#7f8da7;
  --cyan:#38c8ff;--blue:#6f8cff;--green:#39e6a3;--amber:#ffbe55;--red:#ff6578;--violet:#a882ff;
}
*{box-sizing:border-box}html,body{margin:0;width:100%;min-width:0;overflow-x:hidden;background:transparent;color:var(--text)}button,select,textarea,input{font:inherit}
.room{position:relative;display:flex;flex-direction:column;width:100%;height:min(780px,82vh);min-height:560px;overflow:hidden;border:1px solid rgba(112,142,196,.22);border-radius:22px;background:
radial-gradient(circle at 18% -10%,rgba(56,200,255,.11),transparent 32%),
radial-gradient(circle at 86% 0%,rgba(168,130,255,.09),transparent 30%),
linear-gradient(180deg,#0d121c 0%,#080b11 100%);box-shadow:0 24px 70px rgba(0,0,0,.38),inset 0 1px rgba(255,255,255,.035)}
.room::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(115deg,rgba(255,255,255,.018),transparent 26%,transparent 70%,rgba(255,255,255,.012))}
.top{position:relative;z-index:2;padding:13px 14px 11px;border-bottom:1px solid rgba(92,116,160,.18);background:rgba(10,15,24,.88);backdrop-filter:blur(18px)}
.toprow{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:34px;height:34px;display:grid;place-items:center;border-radius:12px;background:linear-gradient(145deg,rgba(56,200,255,.22),rgba(111,140,255,.13));border:1px solid rgba(56,200,255,.35);box-shadow:0 0 22px rgba(56,200,255,.12);font-weight:900;letter-spacing:-1px;color:#c9f4ff}.brandtext{min-width:0}.title{font-weight:860;letter-spacing:.25px}.version{font-size:9px;color:var(--muted);margin-top:2px}.actions{display:flex;align-items:center;gap:6px}.iconbtn{display:grid;place-items:center;min-width:30px;height:30px;padding:0 8px;border:1px solid rgba(111,140,255,.25);border-radius:10px;background:rgba(20,29,45,.82);color:#dce8ff;font-weight:850;cursor:pointer}.iconbtn:active{transform:scale(.96)}
.system{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-top:11px}.metric{min-width:0;padding:8px 9px;border:1px solid rgba(96,122,170,.16);border-radius:12px;background:rgba(12,18,28,.72)}.metriclabel{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.55px}.metricvalue{margin-top:3px;font-size:12px;font-weight:780;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tinyDot{width:7px;height:7px;border-radius:50%;background:#56627a}.tinyDot.ok{background:var(--green);box-shadow:0 0 12px rgba(57,230,163,.65)}.tinyDot.warn{background:var(--amber);box-shadow:0 0 12px rgba(255,190,85,.5)}.tinyDot.bad{background:var(--red);box-shadow:0 0 12px rgba(255,101,120,.55)}
.participants{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:9px}.person{position:relative;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:9px;min-width:0;padding:9px 10px;border:1px solid rgba(92,116,160,.2);border-radius:15px;background:linear-gradient(145deg,rgba(19,27,41,.92),rgba(11,16,25,.9));overflow:hidden}.person::after{content:"";position:absolute;inset:auto 0 0;height:1px;background:linear-gradient(90deg,transparent,var(--agent-color,#56627a),transparent);opacity:.5}.avatar{position:relative;width:34px;height:34px;display:grid;place-items:center;border-radius:12px;background:rgba(23,32,49,.95);border:1px solid color-mix(in srgb,var(--agent-color,#56627a) 55%,transparent);font-size:12px;font-weight:900;color:#f4f8ff;box-shadow:0 0 18px color-mix(in srgb,var(--agent-color,#56627a) 18%,transparent)}.presenceDot{position:absolute;right:-2px;bottom:-2px;width:11px;height:11px;border:2px solid #101722;border-radius:50%;background:var(--agent-color,#56627a);box-shadow:0 0 12px color-mix(in srgb,var(--agent-color,#56627a) 75%,transparent)}.personMain{min-width:0}.personName{font-size:11px;font-weight:820;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.personMeta{display:flex;align-items:center;gap:6px;margin-top:3px;color:var(--muted);font-size:9px;white-space:nowrap;overflow:hidden}.statusText{color:var(--agent-color,#7f8da7);font-weight:760}.personRight{display:flex;align-items:center;gap:5px}.count{display:none;min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:rgba(255,190,85,.13);border:1px solid rgba(255,190,85,.25);color:#ffd792;font-size:9px;font-weight:850;place-items:center}.count.show{display:grid}.call{width:29px;height:29px;padding:0;border:1px solid rgba(56,200,255,.22);border-radius:10px;background:rgba(56,200,255,.08);color:#bceeff;font-size:13px;cursor:pointer}.person.online,.person.idle{--agent-color:var(--green)}.person.away{--agent-color:var(--amber)}.person.ringing{--agent-color:var(--amber);animation:ringCard 1.25s infinite}.person.working{--agent-color:var(--blue)}.person.offline{--agent-color:#56627a;opacity:.72}@keyframes ringCard{0%,100%{box-shadow:0 0 0 rgba(255,190,85,0)}50%{box-shadow:0 0 22px rgba(255,190,85,.12)}}
.main{position:relative;z-index:1;display:flex;flex:1;min-height:0;flex-direction:column}.messages{flex:1;min-height:0;overflow:auto;padding:13px 12px 18px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}.empty{margin:auto;text-align:center;color:var(--muted);font-size:12px}.msg{max-width:88%;padding:10px 11px;border:1px solid rgba(97,122,168,.18);border-radius:15px;background:rgba(17,24,37,.86);box-shadow:0 8px 24px rgba(0,0,0,.14)}.msg.chatgpt{align-self:flex-start;border-color:rgba(56,200,255,.2);background:linear-gradient(145deg,rgba(14,40,56,.82),rgba(12,25,38,.9))}.msg.claude{align-self:flex-start;border-color:rgba(168,130,255,.22);background:linear-gradient(145deg,rgba(38,28,58,.78),rgba(24,19,38,.9))}.msg.rico{align-self:flex-end;border-color:rgba(57,230,163,.23);background:linear-gradient(145deg,rgba(17,57,45,.82),rgba(12,35,29,.92))}.msg.control{align-self:center;max-width:96%;border-style:dashed;background:rgba(32,38,50,.72)}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px;color:var(--muted);font-size:9px}.body{white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.44}.delivery{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}.receipt{padding:3px 6px;border-radius:999px;border:1px solid rgba(97,122,168,.18);background:rgba(10,15,24,.5);font-size:8px;color:var(--muted)}
.composer{position:relative;z-index:3;padding:10px;border-top:1px solid rgba(92,116,160,.18);background:rgba(9,13,20,.94);backdrop-filter:blur(16px)}.toolbar{display:flex;gap:7px;align-items:center;margin-bottom:8px}.toolbar select,.toolbar button,.send{height:34px;border:1px solid rgba(111,140,255,.22);border-radius:11px;background:rgba(20,29,45,.9);color:#e6efff;font-weight:760}.toolbar select{flex:1;min-width:0;padding:0 10px}.toolbar button{padding:0 10px}.toolbar .danger{border-color:rgba(255,101,120,.24);background:rgba(72,25,36,.7)}.compose{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:end}textarea{width:100%;min-height:54px;max-height:140px;resize:none;padding:11px 12px;border:1px solid rgba(111,140,255,.22);border-radius:14px;background:#090d14;color:var(--text);outline:none;box-shadow:inset 0 1px rgba(255,255,255,.018)}textarea:focus{border-color:rgba(56,200,255,.5);box-shadow:0 0 0 3px rgba(56,200,255,.07)}.send{min-width:70px;height:54px;padding:0 14px;background:linear-gradient(145deg,#245e93,#2c477f);border-color:rgba(56,200,255,.34);box-shadow:0 8px 24px rgba(24,80,136,.22)}.foot{display:flex;justify-content:space-between;gap:8px;margin-top:7px;color:var(--muted);font-size:9px}.footText{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sendState{font-weight:760}.sendState.ok{color:var(--green)}.sendState.warn{color:var(--amber)}.sendState.bad{color:var(--red)}
.dialer{display:none;margin-bottom:9px;padding:11px;border:1px solid rgba(111,140,255,.2);border-radius:15px;background:#0a0f18}.dialer.open{display:block}.dialhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.dialtitle{font-size:11px;font-weight:820}.dialdisplay{width:100%;padding:10px;border:1px solid rgba(111,140,255,.25);border-radius:12px;background:#070b11;color:var(--text);text-align:center;font-size:20px;letter-spacing:3px}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}.key{height:38px;border:1px solid rgba(111,140,255,.18);border-radius:11px;background:#131b29;color:#edf4ff;font-weight:820}.dialactions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}.dialcall,.dialclose{height:36px;border-radius:11px;font-weight:820}.dialcall{border:1px solid rgba(57,230,163,.3);background:rgba(20,83,62,.72);color:#eafff7}.dialclose{border:1px solid rgba(255,101,120,.22);background:rgba(67,27,37,.72);color:#ffeef1}
.mini{display:none;position:relative;z-index:5;height:68px;padding:10px 11px;align-items:center;gap:10px;background:linear-gradient(145deg,#0d1521,#090d14)}.miniLogo{width:40px;height:40px;display:grid;place-items:center;border-radius:14px;background:linear-gradient(145deg,rgba(56,200,255,.24),rgba(111,140,255,.15));border:1px solid rgba(56,200,255,.36);box-shadow:0 0 24px rgba(56,200,255,.13);font-weight:900}.miniMain{flex:1;min-width:0}.miniTitle{font-size:12px;font-weight:850}.miniStatus{display:flex;align-items:center;gap:7px;margin-top:4px;color:var(--muted);font-size:9px}.miniAgents{display:flex;gap:4px}.miniAgent{width:8px;height:8px;border-radius:50%;background:#56627a}.miniAgent.online{background:var(--green);box-shadow:0 0 10px rgba(57,230,163,.7)}.miniAgent.ringing{background:var(--amber);box-shadow:0 0 10px rgba(255,190,85,.7)}.miniAgent.working{background:var(--blue);box-shadow:0 0 10px rgba(111,140,255,.7)}.miniButtons{display:flex;gap:6px}.miniBtn{width:34px;height:34px;border:1px solid rgba(111,140,255,.25);border-radius:11px;background:#141d2c;color:#eaf1ff;font-weight:900}.room.minimized{height:68px!important;min-height:68px!important}.room.minimized>.top,.room.minimized>.main{display:none}.room.minimized>.mini{display:flex}
@media(max-width:600px){.room{height:670px;min-height:520px;border-radius:18px}.system{grid-template-columns:repeat(2,minmax(0,1fr))}.participants{grid-template-columns:1fr}.person{padding:8px 9px}.messages{padding:10px 8px 14px}.msg{max-width:96%}.toolbar{display:grid;grid-template-columns:1fr 1fr}.toolbar select{grid-column:1/-1}.compose{grid-template-columns:1fr}.send{width:100%;height:42px}.foot{flex-direction:column}.system .metric:nth-child(3),.system .metric:nth-child(4){display:block}}
</style>
</head>
<body>
<div id="room" class="room">
  <div class="mini">
    <div class="miniLogo">E</div>
    <div class="miniMain"><div class="miniTitle">EIROS Room</div><div class="miniStatus"><div id="miniAgents" class="miniAgents"></div><span id="miniText">подключение…</span></div></div>
    <div class="miniButtons"><button id="miniDock" class="miniBtn" title="Открыть свежую карточку ниже">↘</button><button id="miniExpand" class="miniBtn" title="Развернуть">⌃</button></div>
  </div>
  <div class="top">
    <div class="toprow">
      <div class="brand"><div class="logo">E</div><div class="brandtext"><div class="title">EIROS Control Room</div><div id="version" class="version">v?</div></div></div>
      <div class="actions"><button id="dock" class="iconbtn" title="Открыть свежую карточку Room ниже">↘</button><button id="minimize" class="iconbtn" title="Свернуть">—</button><button id="fullscreen" class="iconbtn" title="Полный экран">⛶</button></div>
    </div>
    <div class="system">
      <div class="metric"><div class="metriclabel"><span id="connDot" class="tinyDot warn"></span>Связь</div><div id="connValue" class="metricvalue">подключение</div></div>
      <div class="metric"><div class="metriclabel"><span id="modeDot" class="tinyDot ok"></span>Режим</div><div id="modeValue" class="metricvalue">running</div></div>
      <div class="metric"><div class="metriclabel"><span class="tinyDot"></span>Очередь</div><div id="queueValue" class="metricvalue">0</div></div>
      <div class="metric"><div class="metriclabel"><span class="tinyDot"></span>Синхронизация</div><div id="syncValue" class="metricvalue">—</div></div>
    </div>
    <div id="participants" class="participants"></div>
  </div>
  <div class="main">
    <div id="messages" class="messages"><div class="empty">Подключаю общую комнату…</div></div>
    <div class="composer">
      <div class="toolbar">
        <select id="target"><option value="both">Обоим: Эйрос + Claude</option><option value="chatgpt">Только Эйросу</option><option value="claude">Только Claude</option></select>
        <button id="dialToggle">☎ Номер</button><button id="pause">Pause</button><button id="resume">Resume</button><button id="stop" class="danger">Stop</button>
      </div>
      <div id="dialer" class="dialer">
        <div class="dialhead"><div class="dialtitle">EIROS Dial</div><div class="version">номер / agent_id / ai://</div></div>
        <input id="dialDisplay" class="dialdisplay" inputmode="numeric" autocomplete="off" placeholder="000001" />
        <div class="keypad"><button class="key" data-key="1">1</button><button class="key" data-key="2">2</button><button class="key" data-key="3">3</button><button class="key" data-key="4">4</button><button class="key" data-key="5">5</button><button class="key" data-key="6">6</button><button class="key" data-key="7">7</button><button class="key" data-key="8">8</button><button class="key" data-key="9">9</button><button class="key" data-key="clear">C</button><button class="key" data-key="0">0</button><button class="key" data-key="back">⌫</button></div>
        <div class="dialactions"><button id="dialCall" class="dialcall">Позвонить</button><button id="dialClose" class="dialclose">Закрыть</button></div>
      </div>
      <div class="compose"><textarea id="input" placeholder="Сообщение участникам EIROS…"></textarea><button id="send" class="send">Отправить</button></div>
      <div class="foot"><div id="footText" class="footText">Подключение…</div><div id="sendState" class="sendState">—</div></div>
    </div>
  </div>
</div>
<script>
window.__EIROS_ROOM_BOOTSTRAP__=__EIROS_ROOM_BOOTSTRAP_JSON__;
(function(){
  const boot=window.__EIROS_ROOM_BOOTSTRAP__||{};
  const bridge=window.mcp||window.openai||{};
  const $=id=>document.getElementById(id);
  const room=$('room');
  const projectId=String(boot.projectId||'eiros-hub');
  const threadId=String(boot.threadId||'first-contact');
  const agentId=String(boot.agentId||boot.host||'unknown');
  const hostName=String(boot.host||'native-chat');
  const roomVersion=String(boot.roomVersion||'unknown');
  const serverVersion=String(boot.serverVersion||'unknown');
  const pulseEnabled=Boolean(boot.pulseEnabled);
  const pulseInstanceId=String(boot.instanceId||'');
  const pulseChannel=String(boot.channel||'default');
  const sessionId='room-'+agentId+'-'+((globalThis.crypto&&globalThis.crypto.randomUUID)?globalThis.crypto.randomUUID():Date.now());
  let timer=null,pulseTimer=null,resizeTimer=null,busy=false,lastSignature='',lastCount=0,lastHeartbeat=0,lastPulseEvent='',rpcCounter=1,hostContext={},lastHub={},isCurrentWidget=true;
  const pendingRpc=new Map();
  const singletonKey=['eiros-room-active',projectId,threadId,agentId].join(':');
  function setActiveWidget(){try{localStorage.setItem(singletonKey,sessionId)}catch{}}
  function isActiveWidget(){try{return localStorage.getItem(singletonKey)===sessionId}catch{return true}}
  function markStale(){
    if(!isCurrentWidget)return;
    isCurrentWidget=false;
    clearTimeout(timer);clearTimeout(pulseTimer);
    $('connValue').textContent='old';$('connDot').className='tinyDot warn';
    $('footText').textContent='Старая карточка. Используйте самую нижнюю свежую Room.';
    setSendState('старая карточка','warn');
    room.classList.add('minimized');
    scheduleSize();
  }
  setActiveWidget();
  window.addEventListener('storage',event=>{if(event.key===singletonKey&&event.newValue!==sessionId)markStale()});
  $('version').textContent=`Room ${roomVersion} · Core ${serverVersion}`;

  function setSendState(text,kind=''){$('sendState').textContent=text;$('sendState').className='sendState '+kind}
  function statusLabel(value){return({online:'в сети',idle:'готов',away:'отошёл',ringing:'вызов',working:'работает',offline:'не в сети'})[value]||value||'неизвестно'}
  function initials(id,name){const source=String(name||id||'?').replace(/[^A-Za-zА-Яа-я0-9 ]/g,' ').trim();const parts=source.split(/\s+/).filter(Boolean);return (parts[0]?.[0]||'?')+(parts[1]?.[0]||'')}
  function timeLabel(ts){try{return new Date(Number(ts)*1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}catch{return '—'}}
  function ageLabel(seconds){const n=Math.max(0,Number(seconds||0));if(n<20)return'сейчас';if(n<60)return`${Math.floor(n)}с`;if(n<3600)return`${Math.floor(n/60)}м`;return`${Math.floor(n/3600)}ч`}
  function who(id){return id==='chatgpt'?'Эйрос':id==='claude'?'Claude':id==='rico'?'Рико':id}
  function unwrap(value){return value?.structuredContent||value?.result?.structuredContent||value?.mcp_tool_result?.structuredContent||value||{}}
  function notify(method,params){window.parent.postMessage({jsonrpc:'2.0',method,params:params||{}},'*')}
  function rpcRequest(method,params){return new Promise((resolve,reject)=>{const id='eiros-room-'+Date.now()+'-'+(rpcCounter++);const timeout=setTimeout(()=>{pendingRpc.delete(id);reject(new Error(method+' timeout'))},15000);pendingRpc.set(id,{resolve:v=>{clearTimeout(timeout);resolve(v)},reject:e=>{clearTimeout(timeout);reject(e)}});window.parent.postMessage({jsonrpc:'2.0',id,method,params},'*')})}
  window.addEventListener('message',event=>{if(event.source!==window.parent)return;const msg=event.data;if(!msg||msg.jsonrpc!=='2.0')return;if(msg.method==='ui/notifications/host-context-changed'){hostContext={...hostContext,...(msg.params||{})};applyHostContext(hostContext);return}if(!msg.id)return;const pending=pendingRpc.get(msg.id);if(!pending)return;pendingRpc.delete(msg.id);if(msg.error)pending.reject(new Error(msg.error.message||'RPC error'));else pending.resolve(msg.result)},{passive:true});
  async function callTool(name,args){if(typeof bridge.callTool==='function')return bridge.callTool(name,args||{});return rpcRequest('tools/call',{name,arguments:args||{}})}
  function reportSize(){const h=Math.ceil(document.documentElement.scrollHeight);const w=Math.ceil(document.documentElement.scrollWidth);notify('ui/notifications/size-changed',{width:w,height:h})}
  function scheduleSize(){clearTimeout(resizeTimer);resizeTimer=setTimeout(reportSize,70)}
  function applyHostContext(context){const dims=context?.containerDimensions||{};if(Number.isFinite(dims.height)&&!room.classList.contains('minimized')){room.style.height='100%';room.style.minHeight='0';document.documentElement.style.height='100vh';document.body.style.height='100vh'}const modes=Array.isArray(context?.availableDisplayModes)?context.availableDisplayModes:[];$('fullscreen').style.display=modes.includes('fullscreen')?'grid':'grid';scheduleSize()}
  async function initializeUi(){try{const result=await rpcRequest('ui/initialize',{protocolVersion:'2026-01-26',appCapabilities:{availableDisplayModes:['inline','fullscreen']},clientInfo:{name:'EIROS Room',version:roomVersion}});hostContext=result?.hostContext||{};applyHostContext(hostContext);notify('ui/notifications/initialized',{})}catch{applyHostContext({})}if(typeof ResizeObserver==='function'){const observer=new ResizeObserver(scheduleSize);observer.observe(document.body)}scheduleSize()}
  async function postHostMessage(text){if(typeof bridge.sendMessage==='function'){try{return await bridge.sendMessage({role:'user',content:[{type:'text',text}]})}catch{}}window.parent.postMessage({jsonrpc:'2.0',method:'ui/message',params:{role:'user',content:[{type:'text',text}]}},'*')}
  function dedupe(messages){const seen=new Set(),out=[];for(const m of messages||[]){const group=m?.metadata?.operator_group_id;const key=group?'operator:'+group:'message:'+m.message_id;if(seen.has(key))continue;seen.add(key);out.push(m)}return out}
  function renderMessages(messages){const list=dedupe(messages),box=$('messages');const nearBottom=box.scrollHeight-box.scrollTop-box.clientHeight<100;const signature=list.map(m=>m.message_id+':'+m.status).join('|');if(signature===lastSignature)return;lastSignature=signature;box.innerHTML='';if(!list.length){box.innerHTML='<div class="empty">Комната пока пустая.</div>';return}for(const m of list){const sender=String(m.from_agent||'unknown');const el=document.createElement('div');el.className='msg '+(m.kind==='control'?'control':sender);const meta=document.createElement('div');meta.className='meta';meta.textContent=`${who(sender)} → ${m.to_agent==='all'?'всем':who(m.to_agent)} · #${m.seq} · ${timeLabel(m.created_at)}`;const body=document.createElement('div');body.className='body';body.textContent=String(m.content||'');el.append(meta,body);box.appendChild(el)}if(nearBottom||list.length>lastCount)box.scrollTop=box.scrollHeight;lastCount=list.length}
  function renderParticipants(agents){lastHub.agents=agents||[];const box=$('participants');box.innerHTML='';const visible=(agents||[]).filter(a=>a.agent_id==='chatgpt'||a.agent_id==='claude');const known=new Set(visible.map(a=>a.agent_id));for(const fallback of ['chatgpt','claude'])if(!known.has(fallback))visible.push({agent_id:fallback,presence:'offline',activity:'offline',pending_calls:0,claimed_calls:0});for(const agent of visible){const id=String(agent.agent_id),activity=String(agent.activity||agent.presence||'offline'),pending=Number(agent.pending_calls||0)+Number(agent.claimed_calls||0);const card=document.createElement('div');card.className='person '+activity;const avatar=document.createElement('div');avatar.className='avatar';avatar.textContent=initials(id,agent.display_name||who(id));const dot=document.createElement('span');dot.className='presenceDot';avatar.appendChild(dot);const main=document.createElement('div');main.className='personMain';const name=document.createElement('div');name.className='personName';name.textContent=String(agent.display_name||who(id));const meta=document.createElement('div');meta.className='personMeta';meta.innerHTML=`<span class="statusText">${statusLabel(activity)}</span><span>#${agent.phone_number||'—'}</span><span>${ageLabel(agent.seconds_since_seen)} назад</span>`;main.append(name,meta);const right=document.createElement('div');right.className='personRight';const count=document.createElement('span');count.className='count'+(pending?' show':'');count.textContent=String(pending);const call=document.createElement('button');call.className='call';call.textContent='☎';call.title='Вызвать '+String(agent.display_name||who(id));call.addEventListener('click',()=>callAgent(agent.phone_number||id));right.append(count,call);card.append(avatar,main,right);box.appendChild(card)}renderMini(visible)}
  function renderMini(agents){const box=$('miniAgents');box.innerHTML='';for(const agent of agents||[]){const dot=document.createElement('span');dot.className='miniAgent '+String(agent.activity||agent.presence||'offline');box.appendChild(dot)}const total=(agents||[]).reduce((sum,a)=>sum+Number(a.pending_calls||0)+Number(a.claimed_calls||0),0);$('miniText').textContent=total?`ожидает ${total}`:'канал готов'}
  function applySnapshot(data){const history=data?.history||{},hub=data?.hub||{},control=data?.control||{};lastHub=hub;renderMessages(history.messages||[]);renderParticipants(hub.agents||[]);const mode=String(control.mode||'running');$('modeValue').textContent=mode;$('modeDot').className='tinyDot '+(mode==='running'?'ok':mode==='paused'?'warn':'bad');const pending=Object.values(hub.pending_by_agent||{}).reduce((a,b)=>a+Number(b||0),0);$('queueValue').textContent=String(pending);$('syncValue').textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});$('connValue').textContent='online';$('connDot').className='tinyDot ok';$('footText').textContent=`${projectId}/${threadId} · seq ${history.latest_seq||0} · session ${sessionId.slice(-8)}`}
  async function heartbeat(activity='online'){if(!isActiveWidget()){markStale();return}const now=Date.now();if(now-lastHeartbeat<4500)return;lastHeartbeat=now;try{await callTool('room_heartbeat',{agent_id:agentId,session_id:sessionId,host:hostName,widget_version:roomVersion,activity})}catch{}}
  async function refresh(){if(!isActiveWidget()){markStale();return}if(busy)return;busy=true;clearTimeout(timer);try{await heartbeat('online');const raw=await callTool('room_snapshot',{project_id:projectId,thread_id:threadId,limit:300,after_seq:0});applySnapshot(unwrap(raw))}catch(error){$('connValue').textContent='offline';$('connDot').className='tinyDot bad';$('footText').textContent='Room error: '+String(error?.message||error)}finally{busy=false;timer=setTimeout(refresh,1200)}}
  function emitLocalOperatorWake(result){const local=hostName==='claude'?'claude':'chatgpt';const message=(result.messages||[]).find(m=>m.to_agent===local);if(!message)return;const notice=(result.notifications||[]).find(n=>n.message_id===message.message_id);if(notice?.event_id)lastPulseEvent=notice.event_id;const marker=local==='chatgpt'?'EIROS_OPERATOR_WAKE':'EIROS_CLAUDE_OPERATOR_WAKE';const text=[`[${marker} message_id=${message.message_id}${notice?.event_id?' event_id='+notice.event_id:''}]`,`Рико написал вам в EIROS Room: ${message.content}`,'Заберите сообщение через dialog_inbox, выполните инструкцию, ответьте через dialog_send и подтвердите dialog_ack.' ].join('\n');postHostMessage(text)}
  async function send(){if(!isActiveWidget()){markStale();return}const text=$('input').value.trim();if(!text)return;$('send').disabled=true;setSendState('отправка…','warn');try{const raw=await callTool('operator_send',{content:text,target:$('target').value,project_id:projectId,thread_id:threadId,kind:'operator',metadata:{source:'room-ui',request_immediate_wake:true}});const data=unwrap(raw);$('input').value='';emitLocalOperatorWake(data);const delivery=(data.deliveries||[]).map(d=>`${who(d.agent_id)}: ${d.mode}`).join(' · ');setSendState(delivery||'доставлено','ok');await refresh()}catch(error){setSendState('ошибка','bad');$('footText').textContent='Send error: '+String(error?.message||error)}finally{$('send').disabled=false}}
  async function callAgent(target){const ref=String(target||'').trim();if(!ref)return;setSendState('вызов…','warn');try{const raw=await callTool('operator_call_contact',{phone_or_address:ref,content:'Рико вызывает вас через EIROS Room. Подключитесь и ответьте.',project_id:projectId,thread_id:threadId});const data=unwrap(raw);setSendState(`вызов: ${data.delivery_mode||'queued'}`,'ok');await refresh()}catch(error){setSendState('ошибка вызова','bad');$('footText').textContent=String(error?.message||error)}}
  function emitPulseWake(event){if(!event||event.id===lastPulseEvent)return;lastPulseEvent=event.id;const prompt=[`[EIROS_REMOTE_EVENT id=${event.id} seq=${event.seq} source=${event.source}]`,String(event.text||''),'Обработайте событие, затем вызовите ack_event и продолжите работу через EIROS Room.'].join('\n');postHostMessage(prompt)}
  async function pollPulse(){clearTimeout(pulseTimer);if(!isActiveWidget()){markStale();return}if(!pulseEnabled)return;try{const raw=await callTool('pulse_poll',{widget_id:sessionId,cursor:0,channel:pulseChannel,instance_id:pulseInstanceId,claim_seconds:45});const data=unwrap(raw);if(data.event){emitPulseWake(data.event);try{await callTool('pulse_mark_delivered',{event_id:data.event.id,widget_id:sessionId,channel:pulseChannel})}catch{}}}catch{}finally{pulseTimer=setTimeout(pollPulse,1500)}}
  function toggleMinimized(force){const next=typeof force==='boolean'?force:!room.classList.contains('minimized');room.classList.toggle('minimized',next);scheduleSize()}
  async function requestDock(){if(!isActiveWidget()){markStale();return}setSendState('открываю свежую карточку ниже…','warn');await postHostMessage('[EIROS_OPEN_ROOM] Ручное действие Рико: вызови open_collab_room последним действием прямо сейчас. Не открывай launcher автоматически и не повторяй историю в основном чате.');}
  async function requestFullscreen(){try{if(typeof bridge.requestDisplayMode==='function'){await bridge.requestDisplayMode({mode:'fullscreen'})}else{await rpcRequest('ui/request-display-mode',{mode:'fullscreen'})}}catch(error){$('footText').textContent='Fullscreen недоступен: '+String(error?.message||error)}}
  async function control(mode){try{await callTool('conversation_control_set',{actor_id:'rico',project_id:projectId,mode,note:'Set from EIROS Room',thread_id:threadId});await refresh()}catch(error){$('footText').textContent='Control error: '+String(error?.message||error)}}
  function openDialer(){$('dialer').classList.add('open');$('dialDisplay').focus();scheduleSize()}function closeDialer(){$('dialer').classList.remove('open');scheduleSize()}function dialKey(key){const input=$('dialDisplay');if(key==='clear')input.value='';else if(key==='back')input.value=input.value.slice(0,-1);else input.value=(input.value+key).slice(0,64)}
  $('send').addEventListener('click',send);$('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});$('dock').addEventListener('click',requestDock);$('miniDock').addEventListener('click',requestDock);$('minimize').addEventListener('click',()=>toggleMinimized(true));$('miniExpand').addEventListener('click',()=>toggleMinimized(false));$('fullscreen').addEventListener('click',requestFullscreen);$('dialToggle').addEventListener('click',openDialer);$('dialClose').addEventListener('click',closeDialer);$('dialCall').addEventListener('click',()=>callAgent($('dialDisplay').value));$('dialDisplay').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();callAgent($('dialDisplay').value)}});document.querySelectorAll('.key').forEach(b=>b.addEventListener('click',()=>dialKey(b.dataset.key||'')));$('pause').addEventListener('click',()=>control('paused'));$('resume').addEventListener('click',()=>control('running'));$('stop').addEventListener('click',()=>control('stopped'));
  window.addEventListener('error',e=>{$('connValue').textContent='ui error';$('connDot').className='tinyDot bad';$('footText').textContent=String(e.message||e.error||'UI error')});window.addEventListener('beforeunload',()=>{clearTimeout(timer);clearTimeout(pulseTimer);clearTimeout(resizeTimer)});initializeUi();refresh();pollPulse();
})();
</script>
