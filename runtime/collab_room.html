<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;--bg:#212121;--panel:#2b2b2b;--panel2:#303030;--line:#3f3f46;--soft:#353535;--text:#ececec;--muted:#a1a1aa;--green:#19c37d;--amber:#f5b849;--red:#ef4444;--blue:#60a5fa}
*{box-sizing:border-box}html,body{margin:0;background:transparent;color:var(--text);overflow:hidden}button,select,textarea,input{font:inherit}.room{width:100%;height:min(760px,82vh);min-height:540px;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line);border-radius:14px;background:var(--bg);box-shadow:0 18px 48px rgba(0,0,0,.28)}
.header{padding:12px;border-bottom:1px solid var(--line);background:#242424}.top{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px;min-width:0}.mark{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:#303030;border:1px solid var(--line);font-weight:800}.title{font-weight:750;letter-spacing:.1px}.subtitle{font-size:10px;color:var(--muted);margin-top:2px}.actions{display:flex;gap:6px}.icon{height:30px;min-width:30px;border:1px solid var(--line);border-radius:8px;background:#303030;color:var(--text);font-weight:700}.grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px;margin-top:10px}.lamp{min-width:0;padding:8px 7px;border:1px solid var(--line);border-radius:10px;background:#292929}.lampName{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.45px}.dot{width:8px;height:8px;border-radius:50%;background:#71717a}.dot.ok{background:var(--green);box-shadow:0 0 10px rgba(25,195,125,.5)}.dot.warn{background:var(--amber);box-shadow:0 0 10px rgba(245,184,73,.45)}.dot.bad{background:var(--red);box-shadow:0 0 10px rgba(239,68,68,.45)}.lampState{margin-top:4px;font-size:11px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.agents{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}.agent{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:9px;padding:9px;border:1px solid var(--line);border-radius:11px;background:#292929}.badge{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;border:1px solid var(--line);background:#303030;font-size:11px;font-weight:800}.agent.ok .badge{border-color:rgba(25,195,125,.5)}.agent.warn .badge{border-color:rgba(245,184,73,.55)}.agent.bad{opacity:.72}.agentMain{min-width:0}.agentName{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.agentMeta{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pill{font-size:10px;padding:3px 7px;border-radius:999px;border:1px solid var(--line);background:#303030;color:var(--muted)}.pill.ok{color:var(--green);border-color:rgba(25,195,125,.4)}.pill.warn{color:var(--amber);border-color:rgba(245,184,73,.4)}.pill.bad{color:#fca5a5;border-color:rgba(239,68,68,.35)}
.main{flex:1;min-height:0;display:grid;grid-template-rows:1fr auto}.messages{min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#212121}.empty{margin:auto;color:var(--muted);font-size:12px}.msg{max-width:92%;padding:9px 10px;border:1px solid var(--line);border-radius:12px;background:#2b2b2b}.msg.rico{align-self:flex-end;border-color:rgba(25,195,125,.35)}.msg.chatgpt{align-self:flex-start;border-color:rgba(96,165,250,.35)}.msg.claude{align-self:flex-start;border-color:rgba(245,184,73,.35)}.msg.control{align-self:center;border-style:dashed}.meta{font-size:9px;color:var(--muted);margin-bottom:5px}.body{white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.42}.composer{border-top:1px solid var(--line);background:#242424;padding:10px}.toolbar{display:flex;gap:7px;margin-bottom:8px}select,.small,textarea,.send{border:1px solid var(--line);border-radius:9px;background:#303030;color:var(--text)}select{flex:1;min-width:0;height:32px;padding:0 8px}.small{height:32px;padding:0 9px}.small.danger{border-color:rgba(239,68,68,.35);color:#fca5a5}.compose{display:grid;grid-template-columns:1fr auto;gap:8px}textarea{min-height:54px;max-height:130px;resize:none;padding:10px;background:#2b2b2b;outline:none}.send{height:54px;padding:0 14px;background:#3b3b3b;font-weight:700}.send:disabled{opacity:.55}.foot{display:flex;justify-content:space-between;gap:8px;margin-top:7px;font-size:10px;color:var(--muted)}.okText{color:var(--green)}.warnText{color:var(--amber)}.badText{color:#fca5a5}.mini{display:none}.room.stale .main,.room.stale .header{opacity:.65}@media(max-width:680px){.room{height:690px;min-height:520px}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.agents{grid-template-columns:1fr}.compose{grid-template-columns:1fr}.send{height:42px}.toolbar{display:grid;grid-template-columns:1fr 1fr}select{grid-column:1/-1}}
</style>
</head>
<body>
<div id="room" class="room">
  <div class="header">
    <div class="top"><div class="brand"><div class="mark">E</div><div><div class="title">EIROS Control</div><div id="version" class="subtitle">loading</div></div></div><div class="actions"><button id="dock" class="icon" title="Open a fresh card below">↘</button><button id="fullscreen" class="icon" title="Fullscreen">⛶</button></div></div>
    <div id="lamps" class="grid"><div class="lamp"><div class="lampName"><span class="dot warn"></span>Tunnel</div><div class="lampState">checking</div></div><div class="lamp"><div class="lampName"><span class="dot warn"></span>Worker</div><div class="lampState">checking</div></div><div class="lamp"><div class="lampName"><span class="dot warn"></span>Broker</div><div class="lampState">checking</div></div><div class="lamp"><div class="lampName"><span class="dot warn"></span>MCP</div><div class="lampState">checking</div></div><div class="lamp"><div class="lampName"><span class="dot warn"></span>Pulse</div><div class="lampState">checking</div></div><div class="lamp"><div class="lampName"><span class="dot warn"></span>Queue</div><div class="lampState">checking</div></div><div class="lamp"><div class="lampName"><span class="dot warn"></span>Git</div><div class="lampState">checking</div></div></div>
    <div id="agents" class="agents"></div>
  </div>
  <div class="main"><div id="messages" class="messages"><div class="empty">Connecting…</div></div>
    <div class="composer"><div class="toolbar"><select id="target"><option value="both">Both agents</option><option value="chatgpt">ChatGPT / EIROS</option><option value="claude">Claude</option></select><button id="callMe" class="small">Call EIROS</button><button id="pause" class="small">Pause</button><button id="resume" class="small">Resume</button><button id="stop" class="small danger">Stop</button></div><div class="compose"><textarea id="input" placeholder="Message the room…"></textarea><button id="send" class="send">Send</button></div><div class="foot"><span id="foot">Starting…</span><span id="state">—</span></div></div>
  </div>
</div>
<script>
window.__EIROS_ROOM_BOOTSTRAP__=__EIROS_ROOM_BOOTSTRAP_JSON__;
(function(){
 const boot=window.__EIROS_ROOM_BOOTSTRAP__||{}, bridge=window.mcp||window.openai||{}, $=id=>document.getElementById(id);
 const room=$('room'), projectId=String(boot.projectId||'eiros-hub'), threadId=String(boot.threadId||'first-contact'), agentId=String(boot.agentId||'chatgpt'), host=String(boot.host||'chatgpt');
 const sessionId='room-'+agentId+'-'+Date.now()+'-'+Math.random().toString(16).slice(2); let timer=null,pulseTimer=null,busy=false,lastSig='',lastEvent='',rpc=1,lastHeartbeat=0,current=true;
 const key=['eiros-room-active',projectId,threadId,agentId].join(':'); try{localStorage.setItem(key,sessionId)}catch{}; function active(){try{return localStorage.getItem(key)===sessionId}catch{return true}}; function stale(){if(!current)return; current=false; clearTimeout(timer); clearTimeout(pulseTimer); room.classList.add('stale'); $('foot').textContent='Old card. Use the newest EIROS card below.'; $('state').textContent='STALE'}; window.addEventListener('storage',e=>{if(e.key===key&&e.newValue!==sessionId)stale()});
 const pending=new Map(); window.addEventListener('message',e=>{if(e.source!==window.parent)return; const m=e.data||{}; if(m.jsonrpc!=='2.0'||!m.id||!pending.has(m.id))return; const p=pending.get(m.id); pending.delete(m.id); m.error?p.reject(new Error(m.error.message||'RPC error')):p.resolve(m.result)});
 function rpcReq(method,params){return new Promise((resolve,reject)=>{const id='eiros-room-'+Date.now()+'-'+rpc++; pending.set(id,{resolve,reject}); window.parent.postMessage({jsonrpc:'2.0',id,method,params},'*'); setTimeout(()=>{if(pending.has(id)){pending.delete(id);reject(new Error(method+' timeout'))}},15000)})}
 async function callTool(name,args){if(typeof bridge.callTool==='function')return bridge.callTool(name,args||{}); return rpcReq('tools/call',{name,arguments:args||{}})}
 async function post(text){if(typeof bridge.sendMessage==='function'){try{return await bridge.sendMessage({role:'user',content:[{type:'text',text}]})}catch{}} window.parent.postMessage({jsonrpc:'2.0',method:'ui/message',params:{role:'user',content:[{type:'text',text}]}},'*')}
 function unwrap(v){return v?.structuredContent||v?.result?.structuredContent||v?.mcp_tool_result?.structuredContent||v||{}}
 function cls(ok,state){state=String(state||'').toLowerCase(); if(ok&&state.includes('active')||ok&&state.includes('ready')||ok&&state.includes('clear')||ok&&state.includes('ok'))return'ok'; if(!ok)return'bad'; return 'warn'}
 function setState(t,c=''){$('state').textContent=t;$('state').className=c}
 function who(id){return id==='chatgpt'?'ChatGPT / EIROS':id==='claude'?'Claude':id==='rico'?'Rico':id}
 function renderLamps(system){const box=$('lamps'); box.innerHTML=''; for(const l of system?.lamps||[]){const c=cls(l.ok,l.state); const el=document.createElement('div'); el.className='lamp'; el.innerHTML=`<div class="lampName"><span class="dot ${c}"></span>${l.name}</div><div class="lampState" title="${l.detail||''}">${l.state||'unknown'}</div>`; box.appendChild(el)}}
 function renderAgents(hub){const box=$('agents'); box.innerHTML=''; const list=(hub?.agents||[]).filter(a=>a.agent_id==='chatgpt'||a.agent_id==='claude'); for(const id of ['chatgpt','claude'])if(!list.find(a=>a.agent_id===id))list.push({agent_id:id,activity:'offline',presence:'offline',seconds_since_seen:9999}); for(const a of list){const state=String(a.activity||a.presence||'offline'); const c=state==='idle'||state==='online'?'ok':state==='ringing'||state==='working'||state==='away'?'warn':'bad'; const pending=Number(a.pending_calls||0)+Number(a.claimed_calls||0); const el=document.createElement('div'); el.className='agent '+c; el.innerHTML=`<div class="badge">${a.agent_id==='claude'?'C':'E'}</div><div class="agentMain"><div class="agentName">${who(a.agent_id)}</div><div class="agentMeta">${state.toUpperCase()} · sessions ${a.active_session_count||0} · ${Math.floor(Number(a.seconds_since_seen||0))}s ago</div></div><div class="pill ${c}">${pending?pending:'ready'}</div>`; box.appendChild(el)}}
 function renderMessages(history){const box=$('messages'), msgs=history?.messages||[]; const sig=msgs.map(m=>m.message_id+':'+m.status).join('|'); if(sig===lastSig)return; lastSig=sig; box.innerHTML=''; if(!msgs.length){box.innerHTML='<div class="empty">Room is empty.</div>';return} for(const m of msgs){const el=document.createElement('div'); el.className='msg '+(m.kind==='control'?'control':String(m.from_agent||'')); const meta=document.createElement('div'); meta.className='meta'; meta.textContent=`${who(m.from_agent)} → ${m.to_agent==='all'?'all':who(m.to_agent)} · #${m.seq} · ${String(m.status||'')}`; const body=document.createElement('div'); body.className='body'; body.textContent=String(m.content||''); el.append(meta,body); box.appendChild(el)} box.scrollTop=box.scrollHeight}
 async function heartbeat(){if(!active()){stale();return} const now=Date.now(); if(now-lastHeartbeat<4500)return; lastHeartbeat=now; try{await callTool('room_heartbeat',{agent_id:agentId,session_id:sessionId,host,widget_version:String(boot.roomVersion||''),activity:'online'})}catch(e){$('foot').textContent='Heartbeat failed: '+(e.message||e)}}
 async function refresh(){if(!active()){stale();return} if(busy)return; busy=true; clearTimeout(timer); try{await heartbeat(); const data=unwrap(await callTool('room_snapshot',{project_id:projectId,thread_id:threadId,limit:250,after_seq:0})); renderLamps(data.system); renderAgents(data.hub); renderMessages(data.history); $('version').textContent=`Room ${boot.roomVersion||'?'} · Core ${data.system?.server_version||boot.serverVersion||'?'}`; $('foot').textContent=`READY · ${projectId}/${threadId} · seq ${data.history?.latest_seq||0}`; setState('READY','okText')}catch(e){$('foot').textContent='Connection error: '+(e.message||e); setState('DEGRADED','badText')} finally{busy=false; timer=setTimeout(refresh,1400)}}
 function localWake(result,label){const msg=result?.to_agent==='chatgpt'?result:(result?.messages||[]).find(m=>m.to_agent==='chatgpt'); if(!msg)return; const id=msg.message_id||result.message_id; const ev=result.notification?.event_id||(result.notifications||[]).find(n=>n.message_id===id)?.event_id||''; post(`[EIROS_OPERATOR_WAKE message_id=${id}${ev?' event_id='+ev:''}]\nRico needs ChatGPT / EIROS attention. Claim this through dialog_inbox as chatgpt, handle it, reply through dialog_send, then dialog_ack.`)}
 async function send(){if(!active()){stale();return} const text=$('input').value.trim(); if(!text)return; $('send').disabled=true; setState('SENDING','warnText'); try{const data=unwrap(await callTool('operator_send',{content:text,target:$('target').value,project_id:projectId,thread_id:threadId,kind:'operator',metadata:{source:'room-ui',request_immediate_wake:true}})); $('input').value=''; localWake(data); setState('SENT','okText'); await refresh()}catch(e){setState('SEND ERROR','badText'); $('foot').textContent=e.message||String(e)} finally{$('send').disabled=false}}
 async function callSelf(){if(!active()){stale();return} setState('CALLING','warnText'); try{const data=unwrap(await callTool('operator_call_contact',{phone_or_address:'chatgpt',content:'Rico is calling ChatGPT / EIROS from EIROS Control.',project_id:projectId,thread_id:threadId})); localWake(data,'call'); setState('CALL SENT','okText'); await refresh()}catch(e){setState('CALL ERROR','badText'); $('foot').textContent=e.message||String(e)}}
 async function control(mode){try{await callTool('conversation_control_set',{actor_id:'rico',project_id:projectId,mode,note:'Set from EIROS Control',thread_id:threadId}); await refresh()}catch(e){$('foot').textContent='Control error: '+(e.message||e)}}
 async function pollPulse(){clearTimeout(pulseTimer); if(!active()){stale();return} try{const d=unwrap(await callTool('pulse_poll',{widget_id:sessionId,cursor:0,channel:String(boot.channel||'default'),instance_id:String(boot.instanceId||''),claim_seconds:45})); if(d.event&&d.event.id!==lastEvent){lastEvent=d.event.id; await post(`[EIROS_REMOTE_EVENT id=${d.event.id} seq=${d.event.seq} source=${d.event.source}]\n${d.event.text||''}\nHandle this event, then call ack_event.`); try{await callTool('pulse_mark_delivered',{event_id:d.event.id,widget_id:sessionId,channel:String(boot.channel||'default')})}catch{}}}catch{} finally{pulseTimer=setTimeout(pollPulse,1700)}}
 $('send').onclick=send; $('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}); $('callMe').onclick=callSelf; $('pause').onclick=()=>control('paused'); $('resume').onclick=()=>control('running'); $('stop').onclick=()=>control('stopped'); $('dock').onclick=()=>post('[EIROS_OPEN_ROOM] Manual Rico action: call open_collab_room as the final tool action once. Do not auto-open launcher.'); $('fullscreen').onclick=()=>rpcReq('ui/request-display-mode',{mode:'fullscreen'}).catch(()=>{});
 refresh(); pollPulse();
})();
</script>
</body>
</html>
