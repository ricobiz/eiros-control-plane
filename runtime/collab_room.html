<!doctype html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;--bg:#0f0f10;--panel:#171717;--panel2:#1f1f1f;--line:#2a2a2d;--line2:#343438;--text:#f3f3f3;--muted:#9b9ba1;--green:#19c37d;--amber:#e6a23c;--red:#ef4444;--blue:#7aa2ff}*{box-sizing:border-box}html,body{margin:0;background:transparent;color:var(--text);overflow:hidden}button,select,textarea{font:inherit}.room{width:100%;height:min(720px,80vh);min-height:500px;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line);border-radius:18px;background:var(--bg);box-shadow:0 20px 60px rgba(0,0,0,.42)}
.head{padding:10px 12px 8px;border-bottom:1px solid var(--line);background:rgba(18,18,19,.96)}.top{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:9px;min-width:0}.logo{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;background:#202022;border:1px solid #303034;color:#d8d8da;font-size:13px;font-weight:800}.title{font-size:18px;font-weight:780;letter-spacing:.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ver{font-size:10px;color:var(--muted);margin-top:1px}.icons{display:flex;gap:6px}.ico{width:30px;height:30px;border:1px solid var(--line2);border-radius:10px;background:#202022;color:#cfcfd3;font-weight:750}.statusbar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;margin-top:8px}.lamp{display:flex;align-items:center;justify-content:center;gap:3px;min-width:0;color:var(--muted);font-size:8px;letter-spacing:.25px;text-transform:uppercase}.dot{width:6px;height:6px;border-radius:99px;background:#666;flex:0 0 auto}.dot.ok{background:var(--green);box-shadow:0 0 7px rgba(25,195,125,.62)}.dot.warn{background:var(--amber);box-shadow:0 0 7px rgba(230,162,60,.50)}.dot.bad{background:var(--red);box-shadow:0 0 7px rgba(239,68,68,.50)}.lampstate{display:none}.agents{display:flex;gap:8px;margin-top:9px;overflow:auto;scrollbar-width:none}.agents::-webkit-scrollbar{display:none}.agent{min-width:145px;display:flex;align-items:center;gap:7px;padding:7px 8px;border:1px solid var(--line);border-radius:12px;background:#171718}.avatar{width:25px;height:25px;border:1px solid var(--line2);border-radius:8px;display:grid;place-items:center;background:#202022;color:#d8d8da;font-size:11px;font-weight:800}.agent.ok .avatar{border-color:rgba(25,195,125,.45)}.agent.warn .avatar{border-color:rgba(230,162,60,.45)}.agent.bad{opacity:.58}.agentText{min-width:0;flex:1}.agentName{font-size:12px;font-weight:690;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.agentMeta{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.agentState{font-size:9px;padding:2px 6px;border-radius:999px;border:1px solid var(--line2);color:var(--muted)}.agentState.ok{color:var(--green);border-color:rgba(25,195,125,.35)}.agentState.warn{color:var(--amber);border-color:rgba(230,162,60,.35)}.agentState.bad{color:#f5a3a3;border-color:rgba(239,68,68,.3)}
.main{flex:1;min-height:0;display:flex;flex-direction:column}.messages{flex:1;min-height:0;overflow:auto;padding:11px 12px;display:flex;flex-direction:column;gap:8px;background:#0f0f10}.empty{margin:auto;color:var(--muted);font-size:12px}.msg{max-width:94%;padding:8px 10px;border:1px solid var(--line);border-radius:13px;background:#181819}.msg.rico{align-self:flex-end;border-color:rgba(25,195,125,.26)}.msg.chatgpt{align-self:flex-start;border-color:rgba(122,162,255,.28)}.msg.claude{align-self:flex-start;border-color:rgba(230,162,60,.25)}.msg.control{align-self:center;border-style:dashed}.meta{font-size:9px;color:var(--muted);margin-bottom:4px}.body{font-size:13px;line-height:1.4;white-space:pre-wrap;word-break:break-word}.composer{padding:9px 10px 10px;border-top:1px solid var(--line);background:#141415}.row{display:flex;gap:7px;margin-bottom:7px;align-items:center}.target{height:32px;flex:1;min-width:0;padding:0 9px;border:1px solid var(--line2);border-radius:11px;background:#202022;color:#e8e8ea;font-size:13px}.miniBtn{height:32px;padding:0 9px;border:1px solid var(--line2);border-radius:11px;background:#202022;color:#cfcfd3;font-size:13px}.callBtn{width:42px;padding:0;font-size:0}.callBtn::before{content:'☎';font-size:15px}.miniBtn.danger{color:#f5a3a3;border-color:rgba(239,68,68,.35)}.compose{display:grid;grid-template-columns:1fr 52px;gap:8px}textarea{min-height:48px;max-height:120px;resize:none;padding:10px 11px;border:1px solid var(--line2);border-radius:13px;background:#1b1b1d;color:var(--text);outline:none}textarea:focus{border-color:#56565c}.send{height:48px;border:1px solid #3d3d42;border-radius:13px;background:#252528;color:#f3f3f3;font-weight:760}.foot{display:flex;justify-content:space-between;gap:8px;margin-top:6px;font-size:9px;color:var(--muted)}.okText{color:var(--green)}.warnText{color:var(--amber)}.badText{color:#f5a3a3}.row.secondary{display:none!important}.room.controlsOpen .row.secondary{display:flex!important}.room.stale{opacity:.74}@media(max-width:560px){.room{height:670px;min-height:490px}.title{font-size:17px}.agent{min-width:132px}.row{display:grid;grid-template-columns:1fr auto auto}.target{grid-column:1/-1}.row.secondary{display:none!important;grid-template-columns:1fr 1fr 1fr}.room.controlsOpen .row.secondary{display:grid!important}.compose{grid-template-columns:1fr}.send{width:100%}}
</style></head><body>
<div id="room" class="room"><div class="head"><div class="top"><div class="brand"><div class="logo">E</div><div><div class="title">EIROS Control</div><div id="version" class="ver">Loading…</div></div></div><div class="icons"><button id="dock" class="ico" title="Open fresh card">↘</button><button id="fullscreen" class="ico" title="Fullscreen">⛶</button></div></div><div id="lamps" class="statusbar"><span class="lamp"><span class="dot warn"></span>Tunnel <span class="lampstate">checking</span></span><span class="lamp"><span class="dot warn"></span>Worker <span class="lampstate">checking</span></span><span class="lamp"><span class="dot warn"></span>Broker <span class="lampstate">checking</span></span><span class="lamp"><span class="dot warn"></span>MCP <span class="lampstate">checking</span></span><span class="lamp"><span class="dot warn"></span>Pulse <span class="lampstate">checking</span></span><span class="lamp"><span class="dot warn"></span>Queue <span class="lampstate">checking</span></span><span class="lamp"><span class="dot warn"></span>Git <span class="lampstate">checking</span></span></div><div id="agents" class="agents"></div></div><div class="main"><div id="messages" class="messages"><div class="empty">Connecting…</div></div><div class="composer"><div class="row"><select id="target" class="target"><option value="both">Both agents</option><option value="chatgpt">ChatGPT / EIROS</option><option value="claude">Claude</option></select><button id="callMe" class="miniBtn callBtn" title="Call EIROS">Call</button><button id="more" class="miniBtn">•••</button></div><div id="secondary" class="row secondary"><button id="pause" class="miniBtn">Pause</button><button id="resume" class="miniBtn">Resume</button><button id="stop" class="miniBtn danger">Stop</button></div><div class="compose"><textarea id="input" placeholder="Message the room…"></textarea><button id="send" class="send">↑</button></div><div class="foot"><span id="foot">Starting…</span><span id="state">—</span></div></div></div></div>
<script>
window.__EIROS_ROOM_BOOTSTRAP__=__EIROS_ROOM_BOOTSTRAP_JSON__;
(()=>{const boot=window.__EIROS_ROOM_BOOTSTRAP__||{},bridge=window.mcp||window.openai||{},$=id=>document.getElementById(id),room=$('room'),projectId=String(boot.projectId||'eiros-hub'),threadId=String(boot.threadId||'first-contact'),agentId=String(boot.agentId||'chatgpt'),host=String(boot.host||'chatgpt');const sessionId='room-'+agentId+'-'+Date.now()+'-'+Math.random().toString(16).slice(2);let timer=null,pulseTimer=null,busy=false,lastSig=null,lastEvent='',rpc=1,lastHeartbeat=0,current=true;const key=['eiros-room-active',projectId,threadId,agentId].join(':');try{localStorage.setItem(key,sessionId)}catch{}function active(){try{return localStorage.getItem(key)===sessionId}catch{return true}}function stale(){if(!current)return;current=false;clearTimeout(timer);clearTimeout(pulseTimer);room.classList.add('stale');$('foot').textContent='Old card. Use the newest EIROS card below.';$('state').textContent='STALE';tele('stale')}window.addEventListener('storage',e=>{if(e.key===key&&e.newValue!==sessionId)stale()});const pending=new Map();window.addEventListener('message',e=>{if(e.source!==window.parent)return;const m=e.data||{};if(m.jsonrpc!=='2.0'||!m.id||!pending.has(m.id))return;const p=pending.get(m.id);pending.delete(m.id);m.error?p.reject(new Error(m.error.message||'RPC error')):p.resolve(m.result)});function rpcReq(method,params){return new Promise((resolve,reject)=>{const id='eiros-room-'+Date.now()+'-'+rpc++;pending.set(id,{resolve,reject});window.parent.postMessage({jsonrpc:'2.0',id,method,params},'*');setTimeout(()=>{if(pending.has(id)){pending.delete(id);reject(new Error(method+' timeout'))}},15000)})}async function callTool(name,args){if(typeof bridge.callTool==='function')return bridge.callTool(name,args||{});return rpcReq('tools/call',{name,arguments:args||{}})}async function post(text){if(typeof bridge.sendMessage==='function'){try{return await bridge.sendMessage({role:'user',content:[{type:'text',text}]})}catch{}}window.parent.postMessage({jsonrpc:'2.0',method:'ui/message',params:{role:'user',content:[{type:'text',text}]}},'*')}function unwrap(v){return v?.structuredContent||v?.result?.structuredContent||v?.mcp_tool_result?.structuredContent||v||{}}
function tele(status,error){try{const snap={text:$('foot')?.textContent||'',state:$('state')?.textContent||'',lamps:$('lamps')?.textContent||'',agents:$('agents')?.textContent||'',messages:$('messages')?.textContent?.slice(0,500)||'',width:innerWidth,height:innerHeight,active:active()};callTool('room_telemetry_update',{widget_id:sessionId,widget_kind:'room',project_id:projectId,thread_id:threadId,status,snapshot:snap,error:String(error||'')}).catch(()=>{})}catch{}}function lampClass(l){const st=String(l.state||'').toLowerCase();if(!l.ok)return'bad';if(st.includes('pending')||st.includes('job'))return'warn';return'ok'}function setState(t,c=''){$('state').textContent=t;$('state').className=c}function who(id){return id==='chatgpt'?'ChatGPT / EIROS':id==='claude'?'Claude':id==='rico'?'Rico':id}function lampShort(n){return({Tunnel:'T',Worker:'W',Broker:'B',MCP:'M',Pulse:'P',Queue:'Q',Git:'G'})[n]||String(n||'?').slice(0,1)}function renderLamps(system){$('lamps').innerHTML=(system?.lamps||[]).map(l=>`<span class="lamp" title="${l.name}: ${String(l.state||'')} ${l.detail||''}"><span class="dot ${lampClass(l)}"></span>${lampShort(l.name)}<span class="lampstate">${String(l.state||'')}</span></span>`).join('')}function renderAgents(hub){let list=(hub?.agents||[]).filter(a=>a.agent_id==='chatgpt'||a.agent_id==='claude');for(const id of ['chatgpt','claude'])if(!list.find(a=>a.agent_id===id))list.push({agent_id:id,activity:'offline',presence:'offline',seconds_since_seen:9999});$('agents').innerHTML=list.map(a=>{const state=String(a.activity||a.presence||'offline'),pending=Number(a.pending_calls||0)+Number(a.claimed_calls||0),c=(state==='idle'||state==='online')?'ok':(state==='offline')?'bad':'warn',label=state==='offline'?'off':pending?String(pending):'ready';return`<div class="agent ${c}"><div class="avatar">${a.agent_id==='claude'?'C':'E'}</div><div class="agentText"><div class="agentName">${who(a.agent_id)}</div><div class="agentMeta">${state.toUpperCase()} · ${a.active_session_count||0} sessions · ${Math.floor(Number(a.seconds_since_seen||0))}s</div></div><span class="agentState ${c}">${label}</span></div>`}).join('')}function renderMessages(history){const box=$('messages'),msgs=history?.messages||[],sig=msgs.map(m=>m.message_id+':'+m.status).join('|');if(sig===lastSig)return;lastSig=sig;box.innerHTML='';if(!msgs.length){box.innerHTML='<div class="empty">Room is empty.</div>';return}for(const m of msgs){const el=document.createElement('div');el.className='msg '+(m.kind==='control'?'control':String(m.from_agent||''));const meta=document.createElement('div');meta.className='meta';meta.textContent=`${who(m.from_agent)} → ${m.to_agent==='all'?'all':who(m.to_agent)} · #${m.seq} · ${String(m.status||'')}`;const body=document.createElement('div');body.className='body';body.textContent=String(m.content||'');el.append(meta,body);box.appendChild(el)}box.scrollTop=box.scrollHeight}async function heartbeat(){if(!active()){stale();return}const now=Date.now();if(now-lastHeartbeat<4500)return;lastHeartbeat=now;try{await callTool('room_heartbeat',{agent_id:agentId,session_id:sessionId,host,widget_version:String(boot.roomVersion||''),activity:'online'})}catch(e){$('foot').textContent='Heartbeat failed: '+(e.message||e)}}async function refresh(){if(!active()){stale();return}if(busy)return;busy=true;clearTimeout(timer);try{await heartbeat();const data=unwrap(await callTool('room_snapshot',{project_id:projectId,thread_id:threadId,limit:250,after_seq:0}));renderLamps(data.system);renderAgents(data.hub);renderMessages(data.history);$('version').textContent=`Room ${boot.roomVersion||'?'} · Core ${data.system?.server_version||boot.serverVersion||'?'}`;$('foot').textContent=`READY · seq ${data.history?.latest_seq||0}`;setState('READY','okText');tele('ready')}catch(e){$('foot').textContent='Connection error: '+(e.message||e);setState('DEGRADED','badText');tele('degraded',e.message||e)}finally{busy=false;timer=setTimeout(refresh,1400)}}function localWake(result){const msg=result?.to_agent==='chatgpt'?result:(result?.messages||[]).find(m=>m.to_agent==='chatgpt');if(!msg)return;const id=msg.message_id||result.message_id,ev=result.notification?.event_id||(result.notifications||[]).find(n=>n.message_id===id)?.event_id||'';post(`[EIROS_OPERATOR_WAKE message_id=${id}${ev?' event_id='+ev:''}]\nRico needs ChatGPT / EIROS attention. Claim through dialog_inbox as chatgpt, handle it, reply through dialog_send, then dialog_ack.`)}async function send(){if(!active()){stale();return}const text=$('input').value.trim();if(!text)return;$('send').disabled=true;setState('SENDING','warnText');try{const data=unwrap(await callTool('operator_send',{content:text,target:$('target').value,project_id:projectId,thread_id:threadId,kind:'operator',metadata:{source:'room-ui',request_immediate_wake:true}}));$('input').value='';localWake(data);setState('SENT','okText');tele('sent');await refresh()}catch(e){setState('SEND ERROR','badText');$('foot').textContent=e.message||String(e)}finally{$('send').disabled=false}}async function callSelf(){if(!active()){stale();return}setState('CALLING','warnText');try{const data=unwrap(await callTool('operator_call_contact',{phone_or_address:'chatgpt',content:'Rico is calling ChatGPT / EIROS from EIROS Control.',project_id:projectId,thread_id:threadId}));localWake(data);setState('CALL SENT','okText');tele('call_sent');await refresh()}catch(e){setState('CALL ERROR','badText');$('foot').textContent=e.message||String(e)}}async function control(mode){try{await callTool('conversation_control_set',{actor_id:'rico',project_id:projectId,mode,note:'Set from EIROS Control',thread_id:threadId});await refresh()}catch(e){$('foot').textContent='Control error: '+(e.message||e)}}async function pollPulse(){clearTimeout(pulseTimer);if(!active()){stale();return}try{const d=unwrap(await callTool('pulse_poll',{widget_id:sessionId,cursor:0,channel:String(boot.channel||'default'),instance_id:String(boot.instanceId||''),claim_seconds:45}));if(d.event&&d.event.id!==lastEvent){const _evtId=d.event.id,_evtSeq=d.event.seq,_evtSrc=d.event.source,_evtTxt=d.event.text||'';await post(`[EIROS_REMOTE_EVENT id=${_evtId} seq=${_evtSeq} source=${_evtSrc}]\n${_evtTxt}\nHandle this event, then call ack_event.`);lastEvent=_evtId;try{await callTool('pulse_mark_delivered',{event_id:_evtId,widget_id:sessionId,channel:String(boot.channel||'default')})}catch{}}}catch{}finally{pulseTimer=setTimeout(pollPulse,1700)}}$('send').onclick=send;$('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});$('callMe').onclick=callSelf;$('more').onclick=()=>room.classList.toggle('controlsOpen');$('pause').onclick=()=>control('paused');$('resume').onclick=()=>control('running');$('stop').onclick=()=>control('stopped');$('dock').onclick=()=>post('[EIROS_OPEN_ROOM] Manual Rico action: call open_collab_room as the final tool action once. Do not auto-open launcher.');$('fullscreen').onclick=()=>rpcReq('ui/request-display-mode',{mode:'fullscreen'}).catch(()=>{});refresh();pollPulse();})();
</script></body></html>
