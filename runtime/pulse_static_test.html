<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{color-scheme:dark;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{margin:0;background:#081019;color:#e8eef5}
.card{margin:0;padding:16px;border:1px solid #2a4058;border-radius:18px;background:#101b28}
h1{margin:0 0 8px;font-size:18px}
p{margin:0;color:#9eb2c5;font-size:13px}
.badge{display:inline-block;margin-top:12px;padding:6px 10px;border-radius:999px;background:#123247;color:#8ee1ff;font-weight:700;font-size:12px}
</style>
</head>
<body>
<div class="card">
  <h1>EIROS static iframe test</h1>
  <p>No JavaScript, no polling, no RPC. If this renders, iframe mounting works.</p>
  <div class="badge">STATIC_RENDER_OK</div>
</div>
</body>
</html>
