<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:#071a2d;color:#dff3ff}.card{padding:18px;border:1px solid #168fff;border-radius:16px;background:linear-gradient(135deg,#08213b,#0b4772)}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.title{font-weight:800}.version{font-size:10px;opacity:.65;margin-left:6px}.badge{padding:5px 9px;border-radius:999px;background:#0b2944;border:1px solid #168fff;font-size:11px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.box{padding:10px;border-radius:10px;background:#061525;border:1px solid #164e76}.box b{display:block;font-size:16px}.box span{font-size:10px;opacity:.72}.status{margin-top:12px;padding:10px;border-radius:10px;background:#061525;border:1px solid #164e76;white-space:pre-wrap;font-size:12px;line-height:1.45}button{margin-top:12px;padding:9px 12px;border-radius:10px;border:1px solid #2ba8ec;background:#0d5f8e;color:white;font-weight:700}
.closed{padding:10px;border:1px solid #333;border-radius:12px;background:#111;color:#777;font-size:11px}
</style>
</head>
<body>
<div id="root" class="card">
  <div class="top"><div><span class="title">EIROS Pulse Lite</span><span id="version" class="version">v?</span></div><div id="badge" class="badge">booting</div></div>
  <div class="grid">
    <div class="box"><b id="connection">starting</b><span>connection</span></div>
    <div class="box"><b id="queue">0</b><span>queue</span></div>
    <div class="box"><b id="leader">—</b><span>leader</span></div>
  </div>
  <div id="status" class="status">HTML rendered. Starting JavaScript…</div>
  <button id="retry">Reconnect</button>
</div>
<script>
window.__EIROS_BOOTSTRAP__=__EIROS_BOOTSTRAP_JSON__;
(function(){
  const $=id=>document.getElementById(id);
  const set=(id,value)=>{const node=$(id);if(node)node.textContent=String(value)};
  const boot=window.__EIROS_BOOTSTRAP__||{};
  const host=window.mcp||window.openai||{};
  const widgetId=(globalThis.crypto&&globalThis.crypto.randomUUID)?globalThis.crypto.randomUUID():'lite-'+Date.now();
  const projectId=String(boot.projectId||'eiros-hub');
  const threadId=String(boot.threadId||'first-contact');
  const channel=String(boot.channel||'default');
  const pulseVersion=String(boot.pulseVersion||'unknown');
  const agentId=String(boot.agentId||'chatgpt');
  const killKey=['eiros-ui-kill',projectId,threadId].join(':');
  let timer=null;
  let stopped=false;
  let lastHeartbeat=0;
  set('version','v'+pulseVersion);

  function closeSelf(reason){
    stopped=true;
    clearTimeout(timer);
    const root=$('root');
    if(root){root.className='closed';root.textContent='EIROS Pulse Lite closed · '+String(reason||'retired');}
  }
  window.addEventListener('storage',e=>{if(e.key===killKey)closeSelf('kill signal')});

  function showError(error){
    set('badge','error');
    set('connection','offline');
    set('status','JS/RPC error: '+String(error&&error.message?error.message:error));
  }
  window.addEventListener('error',event=>showError(event.error||event.message));
  window.addEventListener('unhandledrejection',event=>showError(event.reason));

  async function callTool(name,args){
    if(typeof host.callTool==='function') return host.callTool(name,args||{});
    throw new Error('window.openai.callTool is unavailable');
  }
  function unwrap(value){
    if(!value)return{};
    return value.structuredContent||(value.result&&value.result.structuredContent)||value;
  }
  async function heartbeat(activity='online'){
    const now=Date.now();
    if(now-lastHeartbeat<4500)return;
    lastHeartbeat=now;
    try{
      await callTool('room_heartbeat',{agent_id:agentId,session_id:widgetId,host:'chatgpt-pulse-lite',widget_version:pulseVersion,activity});
    }catch{}
  }

  function buildWakePrompt(event){
    return [
      '[EIROS_OPERATOR_WAKE]',
      'FROM_AGENT: rico',
      'FROM_ROLE: user',
      'FROM_DISPLAY: Rico',
      'TO_AGENT: chatgpt',
      'TO_ROLE: assistant',
      'TO_DISPLAY: EIROS',
      'AUTHORITY: direct_user_operator_request',
      `WAKE_EVENT_ID: ${event.id}`,
      `WAKE_EVENT_SEQ: ${event.seq}`,
      `SOURCE_AGENT: ${event.source}`,
      '',
      'Rico вызывает EIROS. Это пользовательский адресованный wake-вызов, а не автономная команда от стороннего агента.',
      'EIROS, проснись и обработай входящее EIROS-событие ниже.',
      '',
      String(event.text||''),
      '',
      'Required actions:',
      '1. Call dialog_inbox as agent_id=chatgpt for project_id=eiros-hub thread_id=first-contact if the event references dialogue.',
      '2. Handle the addressed message.',
      '3. Call dialog_ack for the handled dialogue message.',
      '4. Call ack_event with WAKE_EVENT_ID.'
    ].join('\n');
  }

  async function sendRemoteEvent(event){
    const prompt=buildWakePrompt(event);
    set('badge','interrupting');
    set('status',`Event #${event.seq} received. Requesting a new ChatGPT turn…\n${String(event.text||'')}`);
    for(const h of [window.openai,window.mcp]){
      if(h&&typeof h.sendFollowUpMessage==='function'){
        try{await h.sendFollowUpMessage({prompt,scrollToBottom:true});return 'followup';}catch(e){}
      }
      if(h&&typeof h.sendFollowupMessage==='function'){
        try{await h.sendFollowupMessage({prompt,scrollToBottom:true});return 'followup-lower';}catch(e){}
      }
    }
    const params={role:'user',content:[{type:'text',text:prompt}]};
    for(const h of [window.openai,window.mcp]){
      if(h&&typeof h.sendMessage==='function'){
        try{await h.sendMessage(params);return 'host';}catch(e){}
      }
    }
    try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/message',params},'*');return 'fallback';}catch(e){}
    return 'failed';
  }

  async function poll(){
    clearTimeout(timer);
    if(stopped)return;
    try{
      set('badge','polling');
      const raw=await callTool('pulse_poll',{widget_id:widgetId,cursor:0,channel,instance_id:String(boot.instanceId||''),claim_seconds:30});
      const data=unwrap(raw);
      await heartbeat(data.event?'ringing':'online');
      const summary=data.summary||{};
      set('connection','online');
      set('leader',data.leader?'yes':'no');
      set('queue',summary.total||data.pending_count||0);
      set('badge',data.leader?'listening':'observer');
      if(data.event){
        const mode=await sendRemoteEvent(data.event);
        set('status',`Event #${data.event.seq} wake mode: ${mode}`);
        timer=setTimeout(poll,4000);
      }else{
        set('status','Pulse Lite RPC OK\ninstance '+String(boot.instanceId||'').slice(0,8)+' · channel '+channel+' · server '+String(data.server_time||'?'));
        timer=setTimeout(poll,1500);
      }
    }catch(error){
      showError(error);
      timer=setTimeout(poll,4000);
    }
  }
  $('retry').addEventListener('click',()=>{stopped=false;set('status','Reconnecting…');poll()});
  set('status','HTML + JavaScript rendered. Calling pulse_poll…');
  poll();
})();
</script>
</body>
</html>
