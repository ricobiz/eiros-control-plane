<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
*{box-sizing:border-box}body{margin:0;background:transparent;color:#ececec}
.pill{min-height:58px;display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid #3f3f46;border-radius:15px;background:#0f0f10;box-shadow:0 12px 34px rgba(0,0,0,.25)}
.logo{width:30px;height:30px;border-radius:9px;background:#303030;border:1px solid #3f3f46;display:grid;place-items:center;font-weight:800}
.main{flex:1;min-width:0}.title{font-size:12px;font-weight:780}.sub{font-size:10px;color:#19c37d;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ver{font-size:10px;color:#a1a1aa;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;margin-top:3px}.badge{font-size:10px;color:#f5b849;border:1px solid #3f3f46;border-radius:999px;padding:2px 6px}
</style>
</head>
<body>
<div class="pill"><div class="logo">E</div><div class="main"><div class="title">EIROS Control Pill</div><div id="sub" class="sub">booting…</div><div id="ver" class="ver">version loading</div></div><span id="badge" class="badge">new</span></div>
<script>
window.__EIROS_CONTROL_PILL_BOOTSTRAP__=__EIROS_CONTROL_PILL_BOOTSTRAP_JSON__;
(()=>{const boot=window.__EIROS_CONTROL_PILL_BOOTSTRAP__||{};
const projectId=String(boot.projectId||'eiros-hub'),threadId=String(boot.threadId||'first-contact'),generation=String(boot.generation||Date.now()),version=String(boot.controlPillVersion||'?');
const killKey=['eiros-ui-kill',projectId,threadId].join(':'),activeKey=['eiros-control-pill-active',projectId,threadId].join(':');
const widgetId='control-pill-'+generation+'-'+Math.random().toString(36).slice(2,8);
try{
  localStorage.setItem(killKey,JSON.stringify({generation,ts:Date.now(),reason:'open_control_pill'}));
  localStorage.setItem(activeKey,widgetId);
  document.getElementById('sub').textContent='old widgets retired · active';
  document.getElementById('ver').textContent='control pill · '+version+' · gen '+generation;
  document.getElementById('badge').textContent='ok';
}catch(e){
  document.getElementById('sub').textContent='local kill failed: '+String(e&&e.message||e);
  document.getElementById('ver').textContent='control pill · '+version;
  document.getElementById('badge').textContent='warn';
}
})();
</script>
</body>
</html>
