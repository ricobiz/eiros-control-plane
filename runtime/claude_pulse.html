<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:#17120d;color:#fff4e8}.card{padding:16px;border:1px solid #b86a2f;border-radius:18px;background:linear-gradient(145deg,#21160f,#3a2112)}.top{display:flex;align-items:center;justify-content:space-between;gap:12px}.title{font-weight:800}.badge{font-size:11px;padding:5px 9px;border-radius:999px;background:#4a2a17;border:1px solid #b86a2f}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.box{padding:10px;border-radius:11px;background:#160f0b;border:1px solid #68401f}.box b{display:block;font-size:16px}.box span{font-size:10px;opacity:.72}.message,.status{margin-top:10px;padding:10px;border-radius:11px;background:#160f0b;border:1px solid #68401f;white-space:pre-wrap;font-size:12px;line-height:1.45}.message{max-height:160px;overflow:auto}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}button{padding:9px 12px;border-radius:10px;border:1px solid #c47738;background:#6f3a17;color:#fff4e8;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <div class="top"><div class="title">EIROS Claude Pulse</div><div id="badge" class="badge">booting</div></div>
  <div class="grid">
    <div class="box"><b id="connection">starting</b><span>connection</span></div>
    <div class="box"><b id="pending">0</b><span>pending</span></div>
    <div class="box"><b id="attempts">0</b><span>delivery attempts</span></div>
  </div>
  <div id="message" class="message">No addressed calls yet.</div>
  <div class="row"><button id="reconnect">Reconnect</button><button id="pause">Pause</button></div>
  <div id="status" class="status">HTML rendered. Starting Claude host bridge…</div>
</div>
<script>
window.__EIROS_BOOTSTRAP__=__EIROS_BOOTSTRAP_JSON__;
(function(){
  const boot=window.__EIROS_BOOTSTRAP__||{};
  const host=window.mcp||window.openai||{};
  const $=id=>document.getElementById(id);
  const set=(id,v)=>{const node=$(id);if(node)node.textContent=String(v)};
  const clientId='claude-pulse-'+((globalThis.crypto&&crypto.randomUUID)?crypto.randomUUID():Date.now());
  let paused=false;
  let timer=null;
  let busy=false;
  let attempts=0;
  let lastEmitted='';
  let rpcCounter=1;
  const pendingRpc=new Map();

  function rpcRequest(method,params){
    return new Promise((resolve,reject)=>{
      const id='eiros-claude-'+Date.now()+'-'+(rpcCounter++);
      const timeout=setTimeout(()=>{pendingRpc.delete(id);reject(new Error(method+' timeout'))},15000);
      pendingRpc.set(id,{resolve:value=>{clearTimeout(timeout);resolve(value)},reject:error=>{clearTimeout(timeout);reject(error)}});
      window.parent.postMessage({jsonrpc:'2.0',id,method,params},'*');
    });
  }
  window.addEventListener('message',event=>{
    if(event.source!==window.parent)return;
    const msg=event.data;
    if(!msg||msg.jsonrpc!=='2.0'||!msg.id)return;
    const pending=pendingRpc.get(msg.id);
    if(!pending)return;
    pendingRpc.delete(msg.id);
    if(msg.error)pending.reject(new Error(msg.error.message||'RPC error'));else pending.resolve(msg.result);
  },{passive:true});

  async function callTool(name,args){
    if(typeof host.callTool==='function')return host.callTool(name,args||{});
    return rpcRequest('tools/call',{name,arguments:args||{}});
  }
  function unwrap(value){
    if(!value)return{};
    return value.structuredContent||(value.result&&value.result.structuredContent)||(value.mcp_tool_result&&value.mcp_tool_result.structuredContent)||value;
  }
  function emitToClaude(message){
    const prompt=[
      `[EIROS_HUB_CALL message_id=${message.message_id} seq=${message.seq} from=${message.from_agent} kind=${message.kind}]`,
      `project_id=${message.project_id}`,
      `thread_id=${message.thread_id}`,
      message.scene_id?`scene_id=${message.scene_id}`:'',
      message.reply_to?`reply_to=${message.reply_to}`:'',
      '',
      message.content,
      '',
      'This is an addressed call delivered from the shared EIROS Hub into this Claude conversation.',
      'Handle it as Claude. If a reply is appropriate, use dialog_send with from_agent="claude", to_agent equal to the sender, preserve project_id/thread_id/scene_id, and set reply_to to this message_id.',
      'After handling it, call dialog_ack with agent_id="claude" and this message_id.'
    ].filter(Boolean).join('\n');
    window.parent.postMessage({jsonrpc:'2.0',method:'ui/message',params:{role:'user',content:[{type:'text',text:prompt}]}},'*');
  }
  function schedule(ms){clearTimeout(timer);timer=setTimeout(poll,ms)}
  async function poll(){
    if(paused){schedule(3000);return}
    if(busy){schedule(1000);return}
    busy=true;
    try{
      set('badge','polling');
      const raw=await callTool('dialog_inbox',{agent_id:'claude',client_id:clientId,limit:1,claim_seconds:120});
      const data=unwrap(raw);
      const messages=Array.isArray(data.messages)?data.messages:[];
      set('connection','online');
      set('pending',data.pending_count||0);
      set('badge','listening');
      if(messages.length){
        const message=messages[0];
        attempts+=1;
        set('attempts',attempts);
        set('message',`#${message.seq} ${message.from_agent} → claude\n${message.content}`);
        if(message.message_id!==lastEmitted){
          lastEmitted=message.message_id;
          emitToClaude(message);
          set('status',`Emitted ui/message for ${message.message_id}. Waiting for Claude to reply and acknowledge.`);
        }
        schedule(1500);
      }else{
        set('status',`Listening as claude via ${clientId.slice(0,18)}…`);
        schedule(1500);
      }
    }catch(error){
      set('connection','offline');
      set('badge','error');
      set('status','Pulse error: '+String(error&&error.message?error.message:error));
      schedule(4000);
    }finally{busy=false}
  }
  $('reconnect').addEventListener('click',()=>{paused=false;lastEmitted='';set('status','Reconnecting…');poll()});
  $('pause').addEventListener('click',()=>{paused=!paused;$('pause').textContent=paused?'Resume':'Pause';if(!paused)poll()});
  window.addEventListener('beforeunload',()=>clearTimeout(timer));
  set('status','HTML + JavaScript rendered. Calling dialog_inbox…');
  poll();
})();
</script>
</body>
</html>
