<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/><style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--bg:#212121;--panel:#2b2b2b;--line:#3f3f46;--text:#ececec;--muted:#a1a1aa;--green:#19c37d;--amber:#f5b849;--red:#ef4444}*{box-sizing:border-box}body{margin:0;background:transparent;color:var(--text)}.box{min-height:50px;display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);border-radius:16px;background:#0f0f10;box-shadow:0 12px 34px rgba(0,0,0,.25);cursor:pointer}.mark{width:30px;height:30px;border-radius:9px;background:#303030;border:1px solid var(--line);display:grid;place-items:center;font-weight:800}.main{flex:1;min-width:0}.title{font-size:12px;font-weight:700}.sub{display:flex;align-items:center;gap:6px;margin-top:5px;color:var(--muted);font-size:10px}.dot{width:8px;height:8px;border-radius:50%;background:#71717a}.dot.ok{background:var(--green);box-shadow:0 0 9px rgba(25,195,125,.5)}.dot.warn{background:var(--amber);box-shadow:0 0 9px rgba(245,184,73,.45)}.dot.bad{background:var(--red);box-shadow:0 0 9px rgba(239,68,68,.45)}.pill{font-size:10px;border:1px solid var(--line);border-radius:999px;padding:3px 7px;background:#303030}.arrow{width:30px;height:30px;border:1px solid var(--line);border-radius:9px;background:#303030;display:grid;place-items:center}.stale{opacity:.65}</style></head><body>
<div id="box" class="box"><div class="mark">E</div><div class="main"><div class="title">EIROS Control</div><div class="sub"><span id="mcp" class="dot"></span><span id="tunnel" class="dot"></span><span id="worker" class="dot"></span><span id="status">Connecting…</span><span id="queue" class="pill">0</span></div></div><div class="arrow">⌃</div></div>
<script>window.__EIROS_LAUNCHER_BOOTSTRAP__=__EIROS_LAUNCHER_BOOTSTRAP_JSON__;(()=>{const boot=window.__EIROS_LAUNCHER_BOOTSTRAP__||{},bridge=window.mcp||window.openai||{},box=document.getElementById('box'),status=document.getElementById('status'),queue=document.getElementById('queue');const agentId=String(boot.agentId||'chatgpt'),projectId=String(boot.projectId||'eiros-hub'),threadId=String(boot.threadId||'first-contact'),sessionId='launcher-'+agentId+'-'+Date.now();let timer=null,pulseTimer=null,last=0,cur=true,lastEvent='';const key=['eiros-launcher-active',agentId,projectId,threadId,String(boot.channel||'default')].join(':');try{localStorage.setItem(key,sessionId)}catch{}function active(){try{return localStorage.getItem(key)===sessionId}catch{return true}}function stale(){if(!cur)return;cur=false;clearTimeout(timer);clearTimeout(pulseTimer);box.classList.add('stale');status.textContent='Old card';tele('stale');queue.textContent='old'}window.addEventListener('storage',e=>{if(e.key===key&&e.newValue!==sessionId)stale()});function unwrap(v){return v?.structuredContent||v?.result?.structuredContent||v?.mcp_tool_result?.structuredContent||v||{}}
function tele(status,error){try{const snap={status:document.getElementById('status')?.textContent||'',queue:document.getElementById('queue')?.textContent||'',className:box.className,width:innerWidth,height:innerHeight,active:active()};callTool('room_telemetry_update',{widget_id:sessionId,widget_kind:'launcher',project_id:projectId,thread_id:threadId,status,snapshot:snap,error:String(error||'')}).catch(()=>{})}catch{}}async function callTool(n,a){if(typeof bridge.callTool==='function')return bridge.callTool(n,a||{});throw new Error('bridge unavailable')}async function post(text){if(typeof bridge.sendMessage==='function'){try{return await bridge.sendMessage({role:'user',content:[{type:'text',text}]})}catch{}}window.parent.postMessage({jsonrpc:'2.0',method:'ui/message',params:{role:'user',content:[{type:'text',text}]}},'*')}function c(name,good){document.getElementById(name).className='dot '+(good?'ok':'bad')}async function heartbeat(){const now=Date.now();if(now-last<4500)return;last=now;try{await callTool('room_heartbeat',{agent_id:agentId,session_id:sessionId,host:'chatgpt-launcher',widget_version:String(boot.launcherVersion||''),activity:'online'})}catch{}}async function refresh(){clearTimeout(timer);if(!active()){stale();return}try{await heartbeat();const d=unwrap(await callTool('room_snapshot',{project_id:projectId,thread_id:threadId,limit:1,after_seq:0}));const lamps=d.system?.lamps||[];c('mcp',!!lamps.find(l=>l.name==='MCP'&&l.ok));c('tunnel',!!lamps.find(l=>l.name==='Tunnel'&&l.ok));c('worker',!!lamps.find(l=>l.name==='Worker'&&l.ok));const pending=Object.values(d.hub?.pending_by_agent||{}).reduce((a,b)=>a+Number(b||0),0);queue.textContent=String(pending);status.textContent=pending?`Pending ${pending}`:'Ready';tele('ready')}catch{status.textContent='Offline';box.classList.add('stale');tele('degraded')}finally{timer=setTimeout(refresh,2500)}}async function poll(){clearTimeout(pulseTimer);if(!active()){stale();return}try{const d=unwrap(await callTool('pulse_poll',{widget_id:sessionId,cursor:0,channel:String(boot.channel||'default'),instance_id:String(boot.instanceId||''),claim_seconds:45}));if(d.event&&d.event.id!==lastEvent){const _evtId=d.event.id,_evtSeq=d.event.seq,_evtSrc=d.event.source,_evtTxt=d.event.text||'';await post(`[EIROS_REMOTE_EVENT id=${_evtId} seq=${_evtSeq} source=${_evtSrc}]\n${_evtTxt}\nHandle this event, then call ack_event.`);lastEvent=_evtId;try{await callTool('pulse_mark_delivered',{event_id:_evtId,widget_id:sessionId,channel:String(boot.channel||'default')})}catch{}}}catch{}finally{pulseTimer=setTimeout(poll,1700)}}box.onclick=()=>{if(!active()){stale();return}post('[EIROS_OPEN_ROOM] Manual Rico action: call open_collab_room as the final tool action once. Do not auto-open launcher.')};refresh();poll()})();</script></body></html>
