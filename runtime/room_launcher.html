<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
*{box-sizing:border-box}
body{margin:0;background:transparent;color:#ececec}
.box{min-height:78px;padding:10px 12px;border:1px solid #3f3f46;border-radius:16px;background:#0f0f10;box-shadow:0 12px 34px rgba(0,0,0,.25)}
.row{display:flex;align-items:center;gap:10px}.mark{width:30px;height:30px;border-radius:9px;background:#303030;border:1px solid #3f3f46;display:grid;place-items:center;font-weight:800}.main{flex:1;min-width:0}.title{font-size:12px;font-weight:700}.sub{margin-top:4px;color:#19c37d;font-size:11px}.ver{margin-top:8px;font-size:10px;color:#a1a1aa;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.pill{display:inline-block;margin-left:6px;padding:2px 6px;border:1px solid #3f3f46;border-radius:999px;color:#f5b849}
</style>
</head>
<body>
<div class="box">
  <div class="row">
    <div class="mark">E</div>
    <div class="main">
      <div class="title">EIROS Control</div>
      <div class="sub">STATIC RENDER OK <span class="pill">no JS</span></div>
    </div>
  </div>
  <div class="ver">launcher static proof · __LAUNCHER_VISIBLE_VERSION__</div>
</div>
</body>
</html>
