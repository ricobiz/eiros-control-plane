<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{color-scheme:dark;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:#081019;color:#e8eef5}.shell{padding:14px;border:1px solid #26384a;border-radius:18px;background:linear-gradient(145deg,#0b1420,#111d2b)}.top{display:flex;align-items:center;justify-content:space-between;gap:10px}.title{font-weight:800}.badge{font-size:11px;padding:5px 9px;border-radius:999px;background:#172638;color:#9bd8ed;border:1px solid #29435c}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.metric{flex:1;min-width:90px;background:#0b131d;border:1px solid #203144;border-radius:12px;padding:9px}.metric b{display:block;font-size:16px}.metric span{font-size:10px;color:#8194a8}.status{margin-top:10px;font-size:11px;color:#8fa3b5;white-space:pre-wrap}.event{margin-top:10px;background:#071019;border:1px solid #203144;border-radius:12px;padding:10px;font-size:12px;line-height:1.45;white-space:pre-wrap;max-height:140px;overflow:auto}button{border:1px solid #34506a;background:#142536;color:#eaf4fb;border-radius:10px;padding:8px 11px;font-weight:700;cursor:pointer}button.primary{background:#0e7490;border-color:#22a5c5}.ok{color:#71d6a1}.err{color:#ff899b}
</style>
</head>
<body>
<div class="shell">
  <div class="top"><div id="title" class="title">EIROS Pulse</div><div id="badge" class="badge">booting</div></div>
  <div class="row">
    <div class="metric"><b id="leader">—</b><span>leader</span></div>
    <div class="metric"><b id="cursor">0</b><span>cursor</span></div>
    <div class="metric"><b id="pending">0</b><span>pending</span></div>
    <div class="metric"><b id="poll">0</b><span>poll ms</span></div>
  </div>
  <div id="event" class="event">No remote events yet.</div>
  <div class="row"><button id="toggle" class="primary">Pause</button><button id="test">Send local test</button></div>
  <div id="status" class="status">Starting bridge…</div>
</div>
<script>
window.__EIROS_BOOTSTRAP__=__EIROS_BOOTSTRAP_JSON__;
(function(){
  const host=window.openai||{};
  const boot=window.__EIROS_BOOTSTRAP__||{};
  const rawSaved=host.widgetState&&host.widgetState.privateContent?host.widgetState.privateContent:{};
  const saved=rawSaved.instanceId===boot.instanceId&&rawSaved.channel===boot.channel?rawSaved:{};
  const widgetId=saved.widgetId||(crypto.randomUUID?crypto.randomUUID():'pulse-'+Date.now()+'-'+Math.random().toString(16).slice(2));
  const instanceId=String(boot.instanceId||'');
  const channel=String(boot.channel||'default');
  const polling=boot.polling||{};
  const activeMs=Number(polling.active_ms||750);
  const idleMinMs=Number(polling.idle_min_ms||1200);
  const idleMaxMs=Number(polling.idle_max_ms||15000);
  let cursor=Number(saved.cursor||0);
  let paused=Boolean(saved.paused||false);
  let interval=1000;
  let timer=null;
  let busy=false;
  let rpcCounter=1;
  const pendingRpc=new Map();

  const $=id=>document.getElementById(id);
  $('title').textContent=(boot.displayName||'EIROS')+' Pulse';
  const set=(id,v)=>{$(id).textContent=String(v)};
  function persist(){
    if(typeof host.setWidgetState==='function'){
      host.setWidgetState({
        modelContent:`${boot.displayName||'EIROS'} Pulse active; instance=${instanceId}; channel=${channel}; cursor=${cursor}; paused=${paused}`,
        privateContent:{widgetId,cursor,paused,instanceId,channel},
        imageIds:[]
      });
    }
  }
  function unwrap(result){
    if(!result)return{};
    if(result.structuredContent)return result.structuredContent;
    if(result.result&&result.result.structuredContent)return result.result.structuredContent;
    if(result.mcp_tool_result&&result.mcp_tool_result.structuredContent)return result.mcp_tool_result.structuredContent;
    if(result.call_tool_result&&result.call_tool_result.structuredContent)return result.call_tool_result.structuredContent;
    return result;
  }
  function rpcRequest(method,params){
    return new Promise((resolve,reject)=>{
      const id='pulse-'+Date.now()+'-'+(rpcCounter++);
      const timeout=setTimeout(()=>{pendingRpc.delete(id);reject(new Error(method+' timeout'))},12000);
      pendingRpc.set(id,{resolve:v=>{clearTimeout(timeout);resolve(v)},reject:e=>{clearTimeout(timeout);reject(e)}});
      window.parent.postMessage({jsonrpc:'2.0',id,method,params},'*');
    });
  }
  window.addEventListener('message',event=>{
    if(event.source!==window.parent)return;
    const msg=event.data;
    if(!msg||msg.jsonrpc!=='2.0'||!msg.id)return;
    const p=pendingRpc.get(msg.id);
    if(!p)return;
    pendingRpc.delete(msg.id);
    if(msg.error)p.reject(new Error(msg.error.message||'RPC error'));else p.resolve(msg.result);
  },{passive:true});
  async function callTool(name,args){
    if(typeof host.callTool==='function')return host.callTool(name,args||{});
    return rpcRequest('tools/call',{name,arguments:args||{}});
  }
  async function updateContext(event){
    const text=`Remote EIROS event ${event.id} from ${event.source} at ${event.created_at}: ${event.text}`;
    try{await rpcRequest('ui/update-model-context',{content:[{type:'text',text}]});}catch(_e){}
  }
  async function postMessage(event){
    const prompt=[
      `[EIROS_REMOTE_EVENT id=${event.id} seq=${event.seq} source=${event.source}]`,
      event.text,
      '',
      'This message was emitted on the EIROS VPS and delivered by the mounted EIROS Pulse component into this same conversation.',
      'Handle it as the current Eiros. After completing the requested action, call ack_event with this event id and a concise result.'
    ].join('\n');
    if(typeof host.sendFollowUpMessage==='function'){
      await host.sendFollowUpMessage({prompt,scrollToBottom:true});
      return;
    }
    window.parent.postMessage({jsonrpc:'2.0',method:'ui/message',params:{role:'user',content:[{type:'text',text:prompt}]}},'*');
  }
  function schedule(ms){
    clearTimeout(timer);
    set('poll',ms);
    timer=setTimeout(tick,ms);
  }
  async function tick(){
    if(paused){schedule(3000);return}
    if(busy){schedule(interval);return}
    busy=true;
    try{
      const raw=await callTool('pulse_poll',{widget_id:widgetId,cursor,channel,instance_id:instanceId});
      const data=unwrap(raw);
      set('leader',data.leader?'yes':'no');
      set('pending',data.pending_count||0);
      set('badge',data.leader?'listening':'observer');
      if(data.event){
        const event=data.event;
        set('event',`#${event.seq} ${event.source}\n${event.text}`);
        await updateContext(event);
        await postMessage(event);
        await new Promise(r=>setTimeout(r,250));
        await callTool('pulse_mark_delivered',{event_id:event.id,widget_id:widgetId,channel});
        cursor=Math.max(cursor,Number(event.seq||0));
        interval=activeMs;
        set('cursor',cursor);
        persist();
        set('status',`Posted remote event ${event.id}`);
      }else{
        interval=Math.min(data.leader?idleMaxMs:Math.min(5000,idleMaxMs),Math.max(idleMinMs,Math.floor(interval*1.5)));
        set('status',`${boot.displayName||'EIROS'} ${String(instanceId).slice(0,8)} · ${channel} · widget ${widgetId.slice(0,8)} · server ${data.server_time||'?'} · latest ${data.latest_seq||0}`);
      }
    }catch(err){
      interval=Math.min(15000,Math.max(2000,interval*2));
      set('badge','error');
      set('status',String(err&&err.message?err.message:err));
    }finally{
      busy=false;
      persist();
      schedule(interval);
    }
  }
  $('toggle').addEventListener('click',()=>{paused=!paused;$('toggle').textContent=paused?'Resume':'Pause';persist();if(!paused){interval=500;schedule(50)}});
  $('test').addEventListener('click',async()=>{
    try{await callTool('emit_event',{text:'PULSE_WIDGET_TEST',source:'pulse-widget',payload:{widget_id:widgetId,instance_id:instanceId,channel},priority:10,channel,idempotency_key:'widget-test-'+widgetId+'-'+Date.now()});interval=250;schedule(50)}catch(err){set('status',String(err))}
  });
  window.addEventListener('beforeunload',()=>clearTimeout(timer));
  set('cursor',cursor);
  set('status',`${boot.displayName||'EIROS'} ${String(instanceId).slice(0,8)} · channel ${channel}`);
  persist();
  schedule(100);
})();
</script>
</body>
</html>
